const SCHEMA_FIELDS={bambino:{label:"Nome bambino"},nato_il:{label:"Data nascita"},eta:{label:"Età"},inizio:{label:"Data inizio"},fine:{label:"Data fine"},sett:{label:"N° settimane"},nav:{label:"Navetta"},pasto_casa:{label:"Pranzo al sacco"},citta:{label:"Città"},quota:{label:"Quota €"},acconto:{label:"Acconto €"},saldato:{label:"Saldato €"},stato:{label:"Stato pagamento"},note_pag:{label:"Note pagamento"},note_bimbo:{label:"Note mediche"},telefono:{label:"Telefono"},genitore:{label:"Genitore"},_ignore:{label:"— Ignora —"}};
const MAPPING_DICT=[
  {pat:/bambino|partecipant|nome.*(bamb|part)|child|nominativo|name/i,field:"bambino"},
  {pat:/navett|trasferiment|bus|pullman|shuttle|\+\s*tras|servizio.*(bus|tras)|pick.?up/i,field:"nav"},

];
const isTrasf=v=>String(v||"").toLowerCase().replace(/\s/g,"").match(/trasferiment|navett|bus|pullman|shuttle/);
const parseBool=v=>{const s=String(v||"").toLowerCase().trim();return["si","sì","yes","✓","x","true","1","incluso","presente"].includes(s)||!!isTrasf(s);};
const parseDate=v=>{if(!v)return"";if(typeof v==="object"&&v instanceof Date)return`${String(v.getDate()).padStart(2,"0")}/${String(v.getMonth()+1).padStart(2,"0")}/${v.getFullYear()}`;if(typeof v==="number"&&v>1000){const d=new Date(Math.round((v-25569)*864e5));return`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;}const s=String(v).trim();if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s))return s;const iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(iso)return`${iso[3]}/${iso[2]}/${iso[1]}`;return s;};
const parseNum=v=>{const n=parseFloat(String(v||"").replace(",","."));return isNaN(n)?0:n;};
const parseStato=v=>{const s=String(v||"").toUpperCase();if(s.includes("SALD"))return"SALDATO";if(s.includes("ACC")||s.includes("PART"))return"ACCONTO";return"DA PAGARE";};
function autoMapHeaders(headers,saved={}){
  const result={};const mapped=new Set();
  headers.forEach(h=>{const k=String(h).trim();if(!k)return;
    if(saved[k.toLowerCase()]){result[k]=saved[k.toLowerCase()];mapped.add(k);return;}
    const found=MAPPING_DICT.find(e=>e.pat.test(k));
    if(found&&!Object.values(result).includes(found.field)){result[k]=found.field;mapped.add(k);}
  });
  return{result,unmapped:headers.filter(h=>h&&!mapped.has(String(h).trim()))};
}
function buildRecord(raw,mapping){
  const base={id:uid(),bambino:"",nato_il:"",eta:0,inizio:"08/06/2026",fine:"03/07/2026",sett:1,nav:false,pasto_casa:false,citta:"",quota:0,acconto:0,saldato:0,da_saldare:0,stato:"DA PAGARE",note_pag:"",note_bimbo:"",telefono:"",genitore:"",n_pasti:0,presenze:{},pasti_log:{}};
  if(Object.values(raw).some(v=>isTrasf(v)))base.nav=true;
  Object.entries(mapping).forEach(([h,f])=>{
    if(f==="_ignore"||!f)return;const val=raw[h];if(val===undefined||val===null||val==="")return;
    if(f==="bambino")base.bambino=String(val).trim();
    else if(f==="nato_il")base.nato_il=parseDate(val);
    else if(f==="eta")base.eta=parseNum(val);
    else if(f==="inizio")base.inizio=parseDate(val);
    else if(f==="fine")base.fine=parseDate(val);
    else if(f==="sett")base.sett=Math.max(1,parseNum(val));
    else if(f==="nav")base.nav=base.nav||parseBool(val);
    else if(f==="pasto_casa")base.pasto_casa=parseBool(val);
    else if(f==="citta")base.citta=String(val).trim();
    else if(f==="quota")base.quota=parseNum(val);
    else if(f==="acconto")base.acconto=parseNum(val);
    else if(f==="saldato")base.saldato=parseNum(val);
    else if(f==="stato")base.stato=parseStato(val);
    else if(f==="note_pag")base.note_pag=String(val).trim();
    else if(f==="note_bimbo")base.note_bimbo=String(val).trim();
    else if(f==="telefono")base.telefono=String(val).replace(/'/g,"").trim();
    else if(f==="genitore")base.genitore=String(val).trim();
  });
  base.da_saldare=calcResidue(base);base.stato=autoStato(base);
  return base;
}



/* ── CONFLICT RESOLVER ── */
function ConflictResolver({data,onConfirm,onCancel}){
  const[decisions,setDecisions]=useState(()=>Object.fromEntries(data.conflicts.map(c=>[c.existing.id,"update"])));
  const finalize=()=>{
    const finalAdd=[...data.toAdd];
    const finalUpdate=[];
    data.conflicts.forEach(c=>{
      if(decisions[c.existing.id]==="update"){
        const merged={...c.existing,...c.incoming,id:c.existing.id,da_saldare:calcResidue({...c.existing,...c.incoming}),stato:autoStato({...c.existing,...c.incoming})};
        finalUpdate.push(merged);
      }else{
        finalAdd.push({...c.incoming,id:uid()});
      }
    });
    onConfirm(finalAdd,finalUpdate);
  };
  return(<div>
    {data.toAdd.length>0&&<div style={{padding:"8px 12px",background:"#f0fdf4",border:"1px solid #16a34a",marginBottom:10,fontSize:12,fontWeight:600}}>✓ {data.toAdd.length} nuovi iscritti pronti per l'aggiunta</div>}
    {data.conflicts.length>0&&<div style={{marginBottom:14}}>
      <div style={{padding:"8px 12px",background:"#fef3c7",border:"1px solid #d97706",marginBottom:8,fontSize:12,fontWeight:600,color:"#92400e"}}>⚠ {data.conflicts.length} conflitti: iscritti con lo stesso nome già presenti nel database</div>
      {data.conflicts.map(c=>(
        <div key={c.existing.id} style={{background:"#fff",border:"1px solid #000",padding:12,marginBottom:8}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>👤 {c.existing.bambino}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10,fontSize:12}}>
            <div style={{background:"#f5f5f3",padding:8}}><div style={{fontWeight:700,marginBottom:4,color:"#555"}}>Dati attuali nel DB</div>
              {Object.entries(c.changed).map(([k])=><div key={k} style={{padding:"2px 0"}}><span style={{color:"#888"}}>{k}:</span> <span style={{fontWeight:600}}>{String(c.existing[k])}</span></div>)}
            </div>
            <div style={{background:"#fef9c3",padding:8}}><div style={{fontWeight:700,marginBottom:4,color:"#854d0e"}}>Dati nel file caricato</div>
              {Object.entries(c.changed).map(([k,v])=><div key={k} style={{padding:"2px 0"}}><span style={{color:"#888"}}>{k}:</span> <span style={{fontWeight:600,color:"#854d0e"}}>{String(v)}</span></div>)}
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setDecisions(d=>({...d,[c.existing.id]:"update"}))} style={{flex:1,padding:"7px",border:`2px solid ${decisions[c.existing.id]==="update"?"#16a34a":"#ccc"}`,background:decisions[c.existing.id]==="update"?"#f0fdf4":"#fff",cursor:"pointer",fontWeight:decisions[c.existing.id]==="update"?700:400,fontSize:12}}>↻ Aggiorna iscrizione esistente</button>
            <button onClick={()=>setDecisions(d=>({...d,[c.existing.id]:"new"}))} style={{flex:1,padding:"7px",border:`2px solid ${decisions[c.existing.id]==="new"?"#185FA5":"#ccc"}`,background:decisions[c.existing.id]==="new"?"#eff6ff":"#fff",cursor:"pointer",fontWeight:decisions[c.existing.id]==="new"?700:400,fontSize:12}}>+ Crea nuova iscrizione separata</button>
          </div>
        </div>
      ))}
    </div>}
    <div style={{display:"flex",gap:10,justifyContent:"flex-end",borderTop:"1px solid #e0e0e0",paddingTop:12}}>
      <button onClick={onCancel} style={{padding:"8px 16px",border:"1px solid #000",background:"#fff",cursor:"pointer"}}>Annulla</button>
      <button onClick={finalize} style={{padding:"8px 22px",border:"1px solid #000",background:"#16a34a",color:"#fff",cursor:"pointer",fontWeight:700}}>✓ Conferma e Integra — {data.toAdd.length+data.conflicts.length} iscritti</button>
    </div>
  </div>);

/* ══ DRAFT EDITOR PANEL ═════════════════════════════════════════
   Schema row estratta dal PDF → bozza editabile prima del commit.
   Il record NON entra nel DB finché l'operatore non preme "Applica".
   Tutto si aggiorna a cascata solo dopo il commit.
*/
function DraftEditorPanel({draft,existingData,onCommit,onDiscard,showToast}){
  const[r,setR]=useState(()=>({...draft}));
  const upd=(k,v)=>setR(prev=>{
    const u={...prev,[k]:v};
    if(["quota","acconto","saldato"].includes(k)){u.da_saldare=calcResidue(u);u.stato=autoStato(u);}
    return u;
  });

  // Rileva conflitto

/* ── PARSER LOCALE PER PDF/WORD ──────────────────────────── */
function parseFormText(text){
  const lines=text.split(/\n/).map(l=>l.trim()).filter(Boolean);
  const full=lines.join("\n");
  const MESI={gennaio:"01",febbraio:"02",marzo:"03",aprile:"04",maggio:"05",giugno:"06",luglio:"07",agosto:"08",settembre:"09",ottobre:"10",novembre:"11",dicembre:"12"};
  function findVal(label,src){
    src=src||lines;
    for(const line of src){const m=line.match(new RegExp(label+"[:\\s]+(.+)","i"));if(m&&m[1].trim())return m[1].trim();}
    return "";
  }
  function parseDate(str){
    if(!str)return "";
    const iso=str.match(/(\d{4})-(\d{2})-(\d{2})/);if(iso)return `${iso[3]}/${iso[2]}/${iso[1]}`;
    const dmy=str.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);if(dmy){const y=dmy[3].length===2?"20"+dmy[3]:dmy[3];return `${dmy[1].padStart(2,"0")}/${dmy[2].padStart(2,"0")}/${y}`;}
    const ital=str.match(/(\d{1,2})\s+(gennaio|febbraio|marzo|aprile|maggio|giugno|luglio|agosto|settembre|ottobre|novembre|dicembre)/i);
    if(ital)return `${ital[1].padStart(2,"0")}/${MESI[ital[2].toLowerCase()]}/2026`;
    return "";
  }
  function dateToInizio(dateStr){
    if(!dateStr)return "08/06/2026";
    const m=dateStr.match(/(\d{2})\/(\d{2})\/(\d{4})/);if(!m)return "08/06/2026";
    const d=new Date(Number(m[3]),Number(m[2])-1,Number(m[1]));
    let best="08/06/2026",bestDiff=Infinity;
    for(const w of WEEKS){const wm=w.dal.match(/(\d{2})\/(\d{2})\/(\d{4})/);if(!wm)continue;
      const wd=new Date(Number(wm[3]),Number(wm[2])-1,Number(wm[1]));
      const diff=Math.abs(d-wd);if(diff<bestDiff){bestDiff=diff;best=w.dal;}}
    return best;
  }

  /* --- DETECT WORDPRESS FORM FORMAT --- */
  const hasDettaglio=/DETTAGLIO\s+MINORE/i.test(full);
  const hasCorpo=/Corpo\s+del\s+messaggio/i.test(full);
  const hasCosto=/Costo\s+\d+\s+settiman/i.test(full);

  if(hasDettaglio||hasCorpo||hasCosto){
    /* === WordPress registration form === */
    const corpoIdx=full.search(/Corpo\s+del\s+messaggio/i);
    const dateIdx=full.search(/DATE\s+CENTRO/i);
    const detIdx=full.search(/DETTAGLIO\s+MINORE/i);
    const headerText=corpoIdx>=0?full.substring(corpoIdx,dateIdx>=0?dateIdx:detIdx>=0?detIdx:full.length):full.substring(0,dateIdx>=0?dateIdx:full.length);
    const headerLines=headerText.split(/\n/).map(l=>l.trim()).filter(Boolean);
    /* Parent info */
    const pNome=findVal("^Nome",headerLines);
    const pCognome=findVal("^Cognome",headerLines);
    const genitore=pNome&&pCognome?`${pNome} ${pCognome}`:"";
    const telefono=(findVal("Telefono",headerLines)||findVal("Cell",headerLines)||findVal("Tel(?!\\.)",headerLines)).replace(/\s/g,"");
    const residenza=findVal("Residenza",headerLines)||findVal("Citt[àa]",headerLines)||findVal("Comune",headerLines);
    const email=findVal("Email",headerLines);
    /* Camp details */
    const dateText=dateIdx>=0?full.substring(dateIdx,detIdx>=0?detIdx:full.length):"";
    const dateLines=dateText.split(/\n/).map(l=>l.trim()).filter(Boolean);
    const dataInizioRaw=findVal("Data inizio",dateLines);
    const dataInizioParsed=parseDate(dataInizioRaw);
    const inizio=dateToInizio(dataInizioParsed);
    const location=findVal("Location",dateLines);
    /* Costo line: "Costo 4 settimane (2 minori) + trasferimento A/R € 660" */
    const costoMatch=full.match(/Costo\s+(\d+)\s+settiman[ae]\s*(.*?)€\s*(\d[\d.,]*)/i)
      ||full.match(/Costo\s+(\d+)\s+settiman[ae]\s*(.*?)\s+(\d[\d.,]*)\s*€/i);
    const sett=costoMatch?parseInt(costoMatch[1]):4;
    const hasNav=costoMatch?/trasferiment|navett|A\/R/i.test(costoMatch[2]):/trasferiment|navett/i.test(full);
    const quotaTotale=costoMatch?parseFloat(costoMatch[3].replace(",",".")):0;
    /* Detect number of minori from costo line "(2 minori)" or "Numero minori" */
    const minoriFromCosto=costoMatch&&costoMatch[2]?costoMatch[2].match(/\((\d+)\s*minor[ie]*\)/i):null;
    const minoriFromNumero=full.match(/Numero\s*minori[:\s]*.*?(\d+)\s*(?:figli|minor|bambin)/i);
    const nMinori=minoriFromCosto?parseInt(minoriFromCosto[1]):minoriFromNumero?parseInt(minoriFromNumero[1]):0;
    /* Sconto */
    const scontoMatch=full.match(/Sconto\s+applicato[:\s]*([^\n]*)/i);
    const note_pag=scontoMatch&&scontoMatch[1].trim()?`Sconto: ${scontoMatch[1].trim()}`:"";
    /* Children from DETTAGLIO MINORE/I section */
    const detText=detIdx>=0?full.substring(detIdx):"";
    const childBlocks=detText.split(/[-]{3,}/);
    const children=[];
    for(const block of childBlocks){
      const bl=block.split(/\n/).map(l=>l.trim()).filter(Boolean);
      const cn=findVal("^nome",bl);const cc=findVal("^cognome",bl);
      if(!cn&&!cc)continue;
      const bambino=cn&&cc?`${cn} ${cc}`:cn||cc;
      const nascitaRaw=findVal("data di nascita",bl)||findVal("nascita",bl)||findVal("nato",bl);
      const nato_il=parseDate(nascitaRaw);
      const noteRaw=findVal("NOTE",bl)||findVal("allergi",bl);
      children.push({bambino,nato_il,note_bimbo:noteRaw||""});
    }
    if(children.length===0&&genitore){children.push({bambino:genitore,nato_il:"",note_bimbo:""});}
    /* Divide quota by number of children */
    const numFigli=children.length>1?children.length:(nMinori>1?nMinori:1);
    const quotaPerFiglio=numFigli>1?Math.round(quotaTotale/numFigli*100)/100:quotaTotale;
    const results=[];
    for(const ch of children){
      if(!ch.bambino||!ch.bambino.trim())continue;
      const rec={id:uid(),bambino:ch.bambino,nato_il:ch.nato_il,eta:calcEta(ch.nato_il),inizio,fine:"",sett:Math.max(1,Math.min(8,sett)),nav:hasNav,pasto_casa:false,citta:residenza,quota:quotaPerFiglio,acconto:0,saldato:0,note_pag,note_bimbo:ch.note_bimbo,telefono,genitore,da_saldare:0,stato:"DA PAGARE",n_pasti:0,presenze:{},pasti_log:{}};
      rec.fine=calcFine(rec.inizio,rec.sett);rec.da_saldare=calcResidue(rec);rec.stato=autoStato(rec);
      results.push(rec);
    }
    return results;
  }

  /* === GENERIC FORM FALLBACK === */
  const get=(pats,fallback="")=>{for(const p of pats){const m=full.match(p);if(m)return(m[1]||"").trim();}return fallback;};
  const getNum=(pats)=>{const v=get(pats,"0");const n=parseFloat(String(v).replace(/[€\s,]/g,m=>m===","?".":""));return isNaN(n)?0:n;};
  const childSplit=text.split(/(?:figlio|bambino|bambina|iscritto|iscritta)\s*(?:n\.?\s*)?[2-9]/i);
  const childBlocks2=[];
  if(childSplit.length>1){childSplit.forEach(block=>{if(block.trim().length>30)childBlocks2.push(block);});}else{childBlocks2.push(text);}
  const results=[];
  for(const block of childBlocks2){
    const blines=block.split(/\n/).map(l=>l.trim()).filter(Boolean);const bfull=blines.join(" ");
    const bg=(pats,fb="")=>{for(const p of pats){const m=bfull.match(p);if(m)return(m[1]||"").trim();}return fb;};
    const bgn=(pats)=>{const v=bg(pats,"0");const n=parseFloat(String(v).replace(/[€\s,]/g,m=>m===","?".":""));return isNaN(n)?0:n;};
    const bgb=(pats)=>{const v=bg(pats,"").toLowerCase();return["si","sì","yes","x","✓","true","1"].includes(v);};
    const nome=bg([/(?:nome\s+(?:e\s+)?cognome|nome\s+bambino|bambino|partecipante|iscritto|nome\s+figlio)[:\s]+([A-ZÀ-Ü][a-zà-ü]+(?:\s+[A-ZÀ-Ü][a-zà-ü]+){1,3})/i,/(?:nome)[:\s]+([A-ZÀ-Ü][a-zà-ü]+)/i]);
    const cognome=bg([/(?:cognome)[:\s]+([A-ZÀ-Ü][a-zà-ü]+(?:\s+[A-ZÀ-Ü][a-zà-ü]+)?)/i]);
    const bambino=nome&&cognome?`${nome} ${cognome}`:nome||cognome||"";
    const natoRaw=bg([/(?:nato\s*il|nascita|data\s*di\s*nascita|data\s*nascita|nato\/a\s*il)[:\s]*(\S+)/i]);
    const nato_il=parseDate(natoRaw);
    const eta=bgn([/(?:et[àa]|anni)[:\s]*(\d{1,2})/i]);
    const citta=bg([/(?:citt[àa]|comune|residenza|localit[àa]|provenienza)[:\s]+([A-ZÀ-Ü][a-zà-ü]+(?:\s+(?:di|del|della|delle)?\s*[A-ZÀ-Ü][a-zà-ü]+)*)/i]);
    const telefono=bg([/(?:telefono|cell|cellulare|tel\.?|mobile)[:\s]*(\+?\d[\d\s\-\.]{7,15})/i]);
    const genitore=bg([/(?:genitore|tutore|padre|madre|referente|nome\s*genitore)[:\s]+([A-ZÀ-Ü][a-zà-ü]+(?:\s+[A-ZÀ-Ü][a-zà-ü]+){1,3})/i]);
    const sett=bgn([/(?:settiman[ae]|sett\.?|n[°\.]\s*settiman)[:\s]*(\d{1,2})/i])||4;
    const nav=bgb([/(?:navett|trasferiment|bus|pullman|shuttle)[:\s]*(s[ìi]|no|true|false|x|✓)/i])||/navett|trasferiment|bus|pullman/i.test(bfull);
    const quota=bgn([/(?:quota|importo|costo\s*totale|totale\s*quota|costo)[:\s€]*(\d[\d\.,]*)/i]);
    const note_bimbo=bg([/(?:allergi[ae]|intolleranz[ae]|patologi[ae]|note\s*mediche|note\s*sanitari[ae])[:\s]+([^\n]{3,80})/i]);
    const note_pag=bg([/(?:note\s*pagament|note\s*pag\.?)[:\s]+([^\n]{3,80})/i]);
    if(bambino){
      const inizioRaw=bg([/(?:data\s*inizio|inizio)[:\s]+(\S+(?:\s+\S+)?)/i]);
      const inizioParsed=parseDate(inizioRaw)||"08/06/2026";
      const inizio=dateToInizio(inizioParsed)||inizioParsed;
      const rec={id:uid(),bambino,nato_il,eta:eta||calcEta(nato_il),inizio,fine:"",sett:Math.max(1,Math.min(8,sett)),nav,pasto_casa:false,citta,quota,acconto:0,saldato:0,note_pag,note_bimbo,telefono:String(telefono).replace(/\s/g,""),genitore,da_saldare:0,stato:"DA PAGARE",n_pasti:0,presenze:{},pasti_log:{}};
      rec.fine=calcFine(rec.inizio,rec.sett);rec.da_saldare=calcResidue(rec);rec.stato=autoStato(rec);
      results.push(rec);
    }
  }
  return results;
}

function TabImport({onSync,existingData,showToast,savedMappings,setSavedMappings,onDraftReady}){
  const[log,setLog]=useState([]);const[uploading,setUploading]=useState(false);
  const[mappingState,setMappingState]=useState(null);
  const[previewData,setPreviewData]=useState(null);
  const addLog=(msg,type="info")=>setLog(p=>[{msg,type,ts:new Date().toLocaleTimeString()},...p.slice(0,29)]);

  function mergeAndPreview(incoming){
    const toAdd=[];const toUpdate=[];const conflicts=[];

      if(!r.bambino.trim())return;
      const ex=existingData.find(e=>e.bambino.toLowerCase().trim()===r.bambino.toLowerCase().trim());
      if(ex){
        const changed={};
        ["acconto","saldato","quota","stato","note_pag","note_bimbo","nav","pasto_casa","citta","sett","inizio","fine"].forEach(k=>{if(r[k]!==undefined&&r[k]!==ex[k])changed[k]=r[k];});
        if(Object.keys(changed).length>0) conflicts.push({existing:ex,incoming:r,changed});
        else toAdd.push({...r,_tipo:"SKIP"});
      }else toAdd.push({...r,_tipo:"NUOVO"});
    });
    if(conflicts.length>0){addLog(`${conflicts.length} conflitti da risolvere`,"warn");}
    setPreviewData({toAdd:toAdd.filter(r=>r._tipo==="NUOVO"),toUpdate,conflicts});
  }

  function confirmImport(finalAdd,finalUpdate){
    const records=[...finalAdd.map(r=>({type:"add",record:r})),...finalUpdate.map(r=>({type:"update",record:r}))];
    const navSync=finalAdd.filter(r=>r.nav).length+finalUpdate.filter(r=>r.nav).length;
    onSync(records);
    showToast(`✓ ${finalAdd.length} aggiunti · ${finalUpdate.length} aggiornati · ${navSync} navette sync`);
    addLog(`✓ ${finalAdd.length} aggiunti, ${finalUpdate.length} aggiornati`,"ok");
    setPreviewData(null);setMappingState(null);
  }

  function readFileAsArrayBuffer(f){
    return new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onload=()=>resolve(reader.result);
      reader.onerror=()=>reject(new Error("Errore lettura file"));
      reader.readAsArrayBuffer(f);
    });
  }

  async function handleFile(file){
    if(!file||uploading)return;setUploading(true);addLog(`Caricamento: ${file.name}`);
    if(file.size===0){addLog("Il file è vuoto (0 bytes)","error");setUploading(false);return;}
    addLog(`Dimensione: ${(file.size/1024).toFixed(1)} KB`);
    const ext=file.name.split(".").pop().toLowerCase();
    try{
      if(ext==="xlsx"||ext==="xls"){
        const buf=await readFileAsArrayBuffer(file);const wb=XLSX.read(buf,{type:"array",cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];const rawMatrix=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        let hi=-1;for(let i=0;i<rawMatrix.length;i++){if(rawMatrix[i].some(c=>String(c).toLowerCase().match(/bambino|nome|partecipant/))){hi=i;break;}}
        if(hi<0){hi=0;}
        const headers=rawMatrix[hi].map(h=>String(h).trim()).filter(Boolean);
        addLog(`Header: ${headers.join(", ")}`);
        const{result:am,unmapped}=autoMapHeaders(headers,savedMappings);
        const trasfCol=headers.find(h=>isTrasf(h));if(trasfCol&&!am[trasfCol]){am[trasfCol]="nav";addLog(`"${trasfCol}" → navetta rilevato automaticamente`,"ok");}
        const rawRows=rawMatrix.slice(hi+1).filter(row=>row.some(c=>c!=="")).filter(row=>{const nm=String(row[0]||"").trim();return nm&&!nm.startsWith("TOTALE")&&!["Stato","SALDATI","ACCONTO","DA PAGARE"].some(x=>nm.startsWith(x));}).map(row=>{const obj={};headers.forEach((h,i)=>{obj[h]=row[i]??"";});return obj;});
        addLog(`${rawRows.length} righe estratte`);
        if(unmapped.length===0){
          const records=rawRows.map(row=>buildRecord(row,am)).filter(r=>r.bambino.trim());addLog(`Auto-sync: ${records.length} record`,"ok");mergeAndPreview(records);
        }else{
          addLog(`${unmapped.length} campi da mappare manualmente`,"warn");
          setMappingState({rawRows,headers,currentMapping:am,unmapped});
        }
      }else if(ext==="docx"){
        const buf=await readFileAsArrayBuffer(file);const res=await mammoth.extractRawText({arrayBuffer:buf});
        addLog("Parsing Word locale…");
        console.log("WORD TEXT EXTRACTED:\n",res.value);
        const records=parseFormText(res.value);
        if(records.length===0){addLog("Nessun iscritto trovato nel Word — controlla formato","warn");addLog("Testo estratto: "+res.value.substring(0,200)+"…","info");setUploading(false);return;}
        records.forEach(r=>addLog(`→ ${r.bambino} | ${r.citta} | ${r.sett}sett | €${r.quota} | nav:${r.nav?"Sì":"No"}`,"ok"));
        addLog(`Estratti ${records.length} bambino/i dal Word`,"ok");
        if(records.length===1){onDraftReady(records[0]);}else{mergeAndPreview(records);}
        setUploading(false);return;
      }else if(ext==="pdf"){
        if(!window.pdfjsLib){addLog("Errore: pdf.js non caricato","error");setUploading(false);return;}
        addLog("Estrazione testo dal PDF…");
        const buf=await readFileAsArrayBuffer(file);
        const uint8=new Uint8Array(buf);
        addLog(`Buffer letto: ${uint8.length} bytes`);
        if(uint8.length===0){addLog("Errore: buffer vuoto dopo la lettura","error");setUploading(false);return;}
        const pdf=await pdfjsLib.getDocument({data:uint8}).promise;
        let fullText="";
        for(let i=1;i<=pdf.numPages;i++){
          const page=await pdf.getPage(i);
          const content=await page.getTextContent();
          let lastY=null;let pageText="";
          for(const item of content.items){
            const y=item.transform?item.transform[5]:null;
            if(lastY!==null&&y!==null&&Math.abs(y-lastY)>3){pageText+="\n";}
            else if(lastY!==null&&item.str){pageText+=" ";}
            pageText+=item.str;
            if(y!==null)lastY=y;
          }
          fullText+=pageText+"\n";
        }
        addLog(`PDF: ${pdf.numPages} pagine, ${fullText.length} caratteri estratti`);
        console.log("PDF TEXT EXTRACTED:\n",fullText);
        if(fullText.trim().length<10){addLog("PDF senza testo leggibile (potrebbe essere un'immagine scansionata)","error");setUploading(false);return;}
        const records=parseFormText(fullText);
        if(records.length===0){addLog("Nessun iscritto trovato nel PDF — controlla formato","warn");addLog("Testo estratto: "+fullText.substring(0,200)+"…","info");setUploading(false);return;}
        records.forEach(r=>addLog(`→ ${r.bambino} | ${r.citta} | ${r.sett}sett | €${r.quota} | nav:${r.nav?"Sì":"No"}`,"ok"));
        addLog(`Estratti ${records.length} bambino/i dal PDF`,"ok");
        if(records.length===1){onDraftReady(records[0]);}else{mergeAndPreview(records);}
        setUploading(false);return;
      }else addLog(`Formato .${ext} non supportato`,"warn");
    }catch(e){addLog(`❌ ${e.message}`,"error");console.error(e);}
    setUploading(false);
  }

  return(<div>
    {/* MAPPING REVIEW */}
    {mappingState&&<Modal title="🗺 Mapping Review" subtitle={`${mappingState.unmapped.length} colonne non riconosciute. Assegna il campo corrispondente.`} onClose={()=>setMappingState(null)} wide>
      <div style={{marginBottom:10,display:"flex",flexWrap:"wrap",gap:6}}>
        {Object.entries(mappingState.currentMapping).filter(([,f])=>!mappingState.unmapped.includes(Object.keys(mappingState.currentMapping).find(h=>mappingState.currentMapping[h]===f))).map(([h,f])=>(
          <span key={h} style={{padding:"2px 7px",background:"#f0fdf4",border:"1px solid #86efac",fontSize:11}}>{h} → <strong>{SCHEMA_FIELDS[f]?.label||f}</strong></span>
        ))}
      </div>
      <table style={{borderCollapse:"collapse",width:"100%",fontSize:12,marginBottom:14}}>
        <thead><tr><th style={{background:"#111",color:"#fff",padding:"6px 8px",border:"1px solid #000",fontSize:11,textAlign:"left"}}>Colonna nel file</th><th style={{background:"#111",color:"#fff",padding:"6px 8px",border:"1px solid #000",fontSize:11}}>Assegna a</th></tr></thead>
        <tbody>{mappingState.unmapped.map(h=>{
          const localVal=mappingState.currentMapping[h]||"_ignore";
          return(<tr key={h} style={{background:"#fef9c3"}}>
            <td style={{border:"1px solid #000",padding:"8px 10px",fontWeight:700,color:"#854d0e"}}>{h}</td>
            <td style={{border:"1px solid #000",padding:"6px 8px"}}>
              <select defaultValue={localVal} onChange={e=>{mappingState.currentMapping[h]=e.target.value;}} style={{width:"100%",padding:"5px 8px",fontSize:12,border:"1px solid #000"}}>
                {Object.entries(SCHEMA_FIELDS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
              </select>
            </td>
          </tr>);
        })}</tbody>
      </table>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <button onClick={()=>setMappingState(null)} style={{padding:"7px 14px",border:"1px solid #000",background:"#fff",cursor:"pointer"}}>Annulla</button>
        <button onClick={()=>{
          const newSaved={...savedMappings};mappingState.unmapped.forEach(h=>{if(mappingState.currentMapping[h]&&mappingState.currentMapping[h]!=="_ignore")newSaved[h.toLowerCase()]=mappingState.currentMapping[h];});
          setSavedMappings(newSaved);
          const records=mappingState.rawRows.map(row=>buildRecord(row,mappingState.currentMapping)).filter(r=>r.bambino.trim());
          mergeAndPreview(records);setMappingState(null);
        }} style={{padding:"7px 20px",border:"1px solid #000",background:"#16a34a",color:"#fff",cursor:"pointer",fontWeight:700}}>✓ Conferma e sincronizza</button>
      </div>
    </Modal>}

    {/* ANTEPRIMA IMPORTAZIONE / GESTIONE CONFLITTI */}
    {previewData&&<Modal title="📋 Anteprima importazione — Stato: In attesa di conferma" subtitle="Controlla i dati estratti. Per i conflitti scegli se aggiornare o creare nuovo." onClose={()=>setPreviewData(null)} wide>
      <ConflictResolver data={previewData} onConfirm={confirmImport} onCancel={()=>setPreviewData(null)}/>
    </Modal>}

    <div style={{padding:"12px 16px",background:"#f0fdf4",border:"1px solid #16a34a",marginBottom:12,fontSize:12}}>
      <div style={{fontWeight:700,marginBottom:6,color:"#166534",fontSize:13}}>🤖 Import Smart — tutti i campi sincronizzati automaticamente</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:8,color:"#166534",lineHeight:1.7}}>
        <div>📋 <strong>PDF</strong> → Draft Editor (revisione campo per campo prima del salvataggio)</div>
        <div>📊 <strong>Excel</strong> → Auto-mapping + Anteprima + Conflict Resolver</div>
        <div>📄 <strong>Word</strong> → Parsing locale + Anteprima + Conflict Resolver</div>
      </div>
      <div style={{marginTop:8,padding:"6px 10px",background:"#dcfce7",border:"1px solid #86efac",fontSize:11,color:"#166534"}}>
        <strong>Campi estratti:</strong> Nome · Cognome · Città · Data nascita · Età · Inizio/Fine campo · N° settimane · Navetta (+ trasferimento) · Pranzo al sacco · Quota · Acconto · Saldo · Allergie/Note mediche · Telefono · Genitore · Stato pagamento — <strong>dopo "Salva le Modifiche" tutto si aggiorna: BEP · Navette · Pasti · Saldi</strong>
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12,marginBottom:14}}>
      {[
        {ext:"Excel .xlsx",icon:"📊",desc:"Auto-mapping + sync immediato verso tutte le tabelle",types:".xlsx,.xls"},
        {ext:"Word .docx",icon:"📄",desc:"Parsing locale — nessuna chiave richiesta",types:".docx"},
        {ext:"PDF modulo",icon:"📋",desc:"Parsing locale — nessuna chiave richiesta",types:".pdf"}
      ].map(f=>(
        <div key={f.ext} style={{background:"#fff",border:"1px solid #000",padding:16,textAlign:"center"}}>
          <div style={{fontSize:26,marginBottom:4}}>{f.icon}</div>
          <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{f.ext}</div>
          <div style={{fontSize:10,color:"#888",marginBottom:10,lineHeight:1.4}}>{f.desc}</div>
          <label style={{display:"block",padding:"9px",background:uploading?"#ccc":"#111",color:"#fff",fontSize:12,fontWeight:600,cursor:uploading?"not-allowed":"pointer"}}>
            {uploading?"Elaborazione…":`⬆ Carica ${f.ext}`}
            <input type="file" accept={f.types} style={{display:"none"}} onChange={e=>{if(e.target.files[0]){handleFile(e.target.files[0]);e.target.value="";}}} disabled={uploading}/>
          </label>
        </div>
      ))}
    </div>
    <div style={{border:"2px dashed #000",padding:24,textAlign:"center",marginBottom:14,background:"#fafafa"}}
      onDragOver={e=>{e.preventDefault();e.currentTarget.style.background="#f0f9ff";}}
      onDragLeave={e=>{e.currentTarget.style.background="#fafafa";}}
      onDrop={e=>{e.preventDefault();e.currentTarget.style.background="#fafafa";handleFile(e.dataTransfer.files[0]);}}>
      <div style={{fontSize:22,marginBottom:4}}>📂</div>
      <div style={{fontSize:13,fontWeight:700,color:"#555"}}>Trascina qui un file</div>
      <div style={{fontSize:11,color:"#888"}}>Auto-sync · Anteprima · Gestione conflitti · Navette e Pasti aggiornati automaticamente</div>
    </div>
    {log.length>0&&<div style={{background:"#fff",border:"1px solid #000",padding:12}}>
      <div style={{fontSize:11,fontWeight:700,marginBottom:6,textTransform:"uppercase"}}>📋 Log</div>
      <div style={{maxHeight:180,overflowY:"auto"}}>
        {log.map((l,i)=><div key={i} style={{fontSize:11,padding:"2px 0",borderBottom:"0.5px solid #f0f0f0",color:l.type==="ok"?"#166534":l.type==="error"?"#991b1b":l.type==="warn"?"#854d0e":"#444"}}>
          <span style={{color:"#aaa",marginRight:6,fontSize:10}}>{l.ts}</span>{l.msg}
        </div>)}
      </div>
    </div>}
  </div>);
}

/* ══ TAB ISCRITTI ════════════════════════════════════════════ */
function TabIscritti({data,setData,showToast,extCerca="",onExtCercaUsed,navCap,trash,setTrash}){
  const[view,setView]=useState(()=>window.innerWidth<768?"card":"table");
  const[fS,setFS]=useState(0);const[fSt,setFSt]=useState("tutti");const[fC,setFC]=useState("tutti");
  const[fA,setFA]=useState(false);const[fI,setFI]=useState(false);
  const[cerca,setCerca]=useState("");const[confirmDel,setConfirmDel]=useState(null);
  const[schedaId,setSchedaId]=useState(null);
  useEffect(()=>{if(extCerca){setCerca(extCerca);if(onExtCercaUsed)onExtCercaUsed();}},[extCerca]);
  const nF=[fS!==0,fSt!=="tutti",fC!=="tutti",fA,fI,cerca.trim()!==""].filter(Boolean).length;
  const resetF=()=>{setFS(0);setFSt("tutti");setFC("tutti");setFA(false);setFI(false);setCerca("");};
  const upd=useCallback((id,k,v)=>setData(prev=>prev.map(r=>{
    if(r.id!==id)return r;
    const u={...r,[k]:v};
    if(["quota","acconto","saldato"].includes(k)){u.da_saldare=calcResidue(u);u.stato=autoStato(u);}
    if(k==="inizio"||k==="sett"){u.fine=calcFine(u.inizio,u.sett);}
    if(k==="nato_il"){u.eta=calcEta(v);}
    return u;
  })),[setData]);

/* ══ TAB CONTABILITÀ NAVETTE ════════════════════════════════════ */
function TabNavetteContab({data,giorniSett,showToast}){
  const{navRows,totNav}=useMemo(()=>calcServizi(data,giorniSett),[data,giorniSett]);
  const[filtro,setFiltro]=useState("tutti");
  const[fSett,setFSett]=useState(0);
  const lista=navRows.filter(r=>{
    if(fSett!==0&&r.settimana!==`S${fSett}`)return false;
    if(filtro!=="tutti"&&r.citta!==filtro)return false;
    return true;

  const nPastoCasa=data.filter(r=>r.pasto_casa).length;
  const nPastiManc=lista.reduce((s,r)=>s+(giorniSett-r.giorni),0);

    setData(prev=>prev.map(r=>{

      GIORNI_NOMI.forEach((_,di)=>{pl[`${settId}_${di}`]=di<newVal;});

        <div style={{fontSize:11,color:"#888",marginTop:4}}>di cui {nPastoCasa} portano pranzo al sacco</div>

      <div style={{background:"#fff",border:"1px solid #000",padding:14}}>

        <div style={{fontSize:22,fontWeight:900,color:"#166534"}}>{E(pastiRows.length>0?totPasti/[...new Set(pastiRows.map(r=>r.id))].length:0)}</div>

        <div style={{fontSize:22,fontWeight:900,color:"#854d0e"}}>{nPastiManc+nPastoCasa*giorniSett}</div>

      <button onClick={()=>{
        const rows=[["Nome bambino","Città","Settimana","Date","Giorni consumati","Tariffa €/giorno","Totale €"],...pastiRows.map(r=>[r.bambino,r.citta,r.settimana,r.settRange,r.giorni,PASTI_RATE,r.totale]),["","","","","TOTALE","",totPasti]];

function TabNavette({data,onAddNav,costs,setCosts}){
  const navCapDyn=costs?.navCap||NAV_CAP;
  const[sel,setSel]=useState(1);
  const[addingTo,setAddingTo]=useState(null);
  const[showCapSettings,setShowCapSettings]=useState(false);
  const w=WEEKS.find(x=>x.id===sel);

  const senzaNav=data.filter(r=>!r.nav&&calcWeeks(r.inizio,r.sett).includes(sel));
  // Raggruppa per punto di PARTENZA: Molfetta→Terlizzi, tutti gli altri per città
  const byPartenza=kids.reduce((acc,r)=>{
    const p=getPartenza(r.citta)||r.citta||"Altro";

  const NAVETTE_ORD=["Ruvo di Puglia","Terlizzi","Corato"];
  const partenze=NAVETTE_ORD.filter(p=>byPartenza[p]);
  const TH={background:"#111",color:"#fff",padding:"6px 9px",border:"1px solid #000",textAlign:"left",fontWeight:600,fontSize:11};

  const doPrint=()=>{
    const rowsHtml=partenze.map(p=>{
      const cap=navCapDyn[p]??14;
      const list=byPartenza[p]||[];
      const trs=list.map((r,i)=>{
        const notaStyle=noteType(r.note_bimbo)?"background:#fef2f2;color:#991b1b;font-weight:bold;":"color:#aaa;";

      }).join("");

    const pw=window.open("","_blank");pw.document.write(html);pw.document.close();pw.print();

      <div style={{display:"flex",gap:4,flexWrap:"wrap",flex:1}}>

          const alert=NAVETTE_ORD.some(p=>{
            const cap=navCapDyn[p]??14;

            return used/cap>=0.9;

            <div style={{fontWeight:700}}>{wk.label}</div>
            <div style={{fontSize:9,opacity:.8}}>{wk.range}</div>
            <div style={{fontSize:10,marginTop:2,fontWeight:cnt>0?700:400,color:cnt>0?"inherit":"#aaa"}}>{cnt>0?cnt+" 🚐":"—"}</div>
          </button>);
        })}
      </div>
      <button onClick={()=>setShowCapSettings(!showCapSettings)} style={{padding:"7px 14px",fontSize:12,border:`1px solid ${showCapSettings?"#d97706":"#000"}`,background:showCapSettings?"#fef3c7":"#fff",color:showCapSettings?"#92400e":"#444",cursor:"pointer",fontWeight:700}}>⚙ Capienza</button>

    {showCapSettings&&<div style={{background:"#fff",border:"2px solid #d97706",padding:14,marginBottom:12}}>

/* ══ TAB EDUCATORI ═════════════════════════════════════════ */
function TabEducatori({data,costs,setCosts}){
  const RATIO=10; // 1 educatore ogni 10 bambini
  const MIN_SENIOR=2;
  const EDU_TYPES=[
    {key:"senior",label:"Senior",defaultPay:300,bg:"#166534",fg:"#dcfce7"},
    {key:"junior",label:"Junior",defaultPay:200,bg:"#854d0e",fg:"#fef9c3"},
  ];
  /* Educator roster stored in costs.educatori */
  const educatori=costs.educatori||[];
  const setEdu=fn=>setCosts(p=>({...p,educatori:typeof fn==="function"?fn(p.educatori||[]):fn}));
  /* Per-week children count */
  const weekKids=useMemo(()=>{
    const c={};WEEKS.forEach(w=>{c[w.id]=0;});
    data.forEach(r=>{if(!r.bambino?.trim())return;calcWeeks(r.inizio,r.sett).forEach(wId=>{c[wId]=(c[wId]||0)+1;});});
    return c;
  },[data]);
  /* Per-week required educators */
  const weekReq=useMemo(()=>{
    const r={};WEEKS.forEach(w=>{
      const kids=weekKids[w.id]||0;
      const tot=Math.max(kids>0?MIN_SENIOR:0,Math.ceil(kids/RATIO));
      const senior=Math.min(tot,Math.max(MIN_SENIOR,0));
      const junior=Math.max(0,tot-senior);
      r[w.id]={kids,tot,senior,junior};
    });return r;
  },[weekKids]);
  /* Per-week assigned educators */
  const weekAssigned=useMemo(()=>{
    const a={};WEEKS.forEach(w=>{a[w.id]={senior:0,junior:0,tot:0,names:[]};});
    educatori.forEach(ed=>{
      (ed.settimane||[]).forEach(wId=>{
        if(!a[wId])return;
        a[wId][ed.tipo]=(a[wId][ed.tipo]||0)+1;
        a[wId].tot++;
        a[wId].names.push(ed.nome);
      });
    });return a;
  },[educatori]);
  /* Weekly cost */
  const weekCost=useMemo(()=>{
    const c={};WEEKS.forEach(w=>{c[w.id]=0;});
    educatori.forEach(ed=>{
      (ed.settimane||[]).forEach(wId=>{c[wId]=(c[wId]||0)+(ed.paga||0);});
    });return c;
  },[educatori]);
  const totCost=Object.values(weekCost).reduce((s,v)=>s+v,0);
  /* Add educator */
  const addEdu=(tipo)=>{
    const pay=EDU_TYPES.find(t=>t.key===tipo)?.defaultPay||200;
    setEdu(p=>[...p,{id:uid(),nome:"",tipo,paga:pay,settimane:[],telefono:"",note:""}]);
  };
  const upEdu=(id,k,v)=>setEdu(p=>p.map(e=>e.id===id?{...e,[k]:v}:e));
  const rmEdu=id=>setEdu(p=>p.filter(e=>e.id!==id));
  const toggleWeek=(edId,wId)=>setEdu(p=>p.map(e=>{
    if(e.id!==edId)return e;
    const s=e.settimane||[];
    return{...e,settimane:s.includes(wId)?s.filter(x=>x!==wId):[...s,wId]};
  }));

  const TH={background:"#111",color:"#fff",padding:"6px 8px",border:"1px solid #000",textAlign:"center",fontSize:10,fontWeight:600};
  const TD={border:"1px solid #000",padding:"5px 8px",fontSize:11,textAlign:"center"};

  return(<div>
    {/* DASHBOARD RICHIESTA */}
    <div style={{background:"#fff",border:"1px solid #000",padding:14,marginBottom:12}}>

        const settCount=(ed.settimane||[]).length;
        const costoTot=settCount*(ed.paga||0);
        return(<div key={ed.id} style={{border:`2px solid ${tipo.bg}`,marginBottom:8,background:"#fff"}}>

            <input value={ed.telefono||""} onChange={e=>upEdu(ed.id,"telefono",e.target.value)} placeholder="Telefono…" style={{width:120,padding:"4px 8px",fontSize:11,border:"1px solid #ccc"}}/>

            </div>
            <span style={{fontSize:11,fontWeight:700,color:tipo.bg}}>{settCount} sett. = {E(costoTot)}</span>
            <button onClick={()=>rmEdu(ed.id)} style={{background:"none",border:"none",color:"#dc2626",fontSize:16,cursor:"pointer",fontWeight:900,marginLeft:"auto"}}>×</button>

            })}
          </div>
          {ed.note!==undefined&&<div style={{padding:"0 12px 6px"}}>
            <input value={ed.note||""} onChange={e=>upEdu(ed.id,"note",e.target.value)} placeholder="Note (es. specializzazione, certificazioni…)" style={{width:"100%",padding:"3px 8px",fontSize:10,border:"1px solid #eee",color:"#666"}}/>

        </div>);
      })}
    </div>

    {/* RIEPILOGO COPERTURA */}
    <div style={{background:"#111",color:"#fff",padding:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10}}>

        <div><div style={{fontSize:10,color:"#aaa"}}>Senior / Junior</div><div style={{fontSize:20,fontWeight:900}}>{educatori.filter(e=>e.tipo==="senior").length} / {educatori.filter(e=>e.tipo==="junior").length}</div></div>
        <div><div style={{fontSize:10,color:"#aaa"}}>Costo totale</div><div style={{fontSize:20,fontWeight:900,color:"#fca5a5"}}>{E(totCost)}</div></div>
        <div><div style={{fontSize:10,color:"#aaa"}}>Settimane coperte</div><div style={{fontSize:20,fontWeight:900,color:WEEKS.every(w=>(weekReq[w.id].kids===0)||(weekAssigned[w.id].tot>=weekReq[w.id].tot&&(weekAssigned[w.id].senior||0)>=MIN_SENIOR))?"#4ade80":"#fca5a5"}}>{WEEKS.filter(w=>weekReq[w.id].kids>0&&weekAssigned[w.id].tot>=weekReq[w.id].tot&&(weekAssigned[w.id].senior||0)>=MIN_SENIOR).length}/{WEEKS.filter(w=>weekReq[w.id].kids>0).length}</div></div>
      </div>
    </div>
  </div>);
}

/* ══ TAB COSTI ══════════════════════════════════════════════ */

  const tot=costs.voci.reduce((s,v)=>s+v.importo,0);
  const TH={background:"#111",color:"#fff",padding:"6px 8px",border:"1px solid #000",textAlign:"left",fontSize:11,fontWeight:600};
  const TD={border:"1px solid #000",padding:"5px 8px",fontSize:12};
  const iS={border:"none",background:"transparent",width:"100%",fontSize:12,color:"#1a1a1a",padding:0};

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>

      <div style={{background:"#fff",border:"1px solid #000",padding:12}}>
        <div style={{fontSize:10,color:"#666",marginBottom:6}}>Costi servizi esterni (navette+cucina)</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[["Navette €","costoNavette"],["Cucina €","costoCucina"]].map(([l,k])=>(
            <div key={k}><label style={{fontSize:10,color:"#888"}}>{l}</label>
              <input type="number" value={costs[k]} min={0} step={100} onChange={e=>setCosts(p=>({...p,[k]:Number(e.target.value)}))} style={{width:"100%",padding:"4px 6px",fontSize:13,border:"1px solid #000",fontWeight:700}}/></div>
          ))}
        </div>
      </div>
    </div>
    {cats.map(cat=>{
      const voci=costs.voci.filter(v=>v.cat===cat);const sub=voci.reduce((s,v)=>s+v.importo,0);
      return(<div key={cat} style={{background:"#fff",border:"1px solid #000",marginBottom:10,padding:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,borderBottom:"2px solid #000",paddingBottom:5}}>
          <div style={{fontWeight:800,fontSize:13}}>{cat}</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontWeight:700,color:"#185FA5"}}>{E(sub)}</span>
            <button onClick={()=>setCosts(p=>({...p,voci:[...p.voci,{id:uid(),cat,label:"Nuova voce",importo:0,note:""}]}))} style={{padding:"3px 8px",fontSize:11,border:"1px solid #000",background:"#fff",cursor:"pointer",fontWeight:600}}>+ Voce</button>
          </div>
        </div>
        <table style={{borderCollapse:"collapse",width:"100%",fontSize:12}}>
          <thead><tr>{["Descrizione","€","Note",""].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
          <tbody>{voci.map(v=>(
            <tr key={v.id}>
              <td style={{...TD,minWidth:180,textAlign:"left"}}><input value={v.label} onChange={e=>up(v.id,"label",e.target.value)} style={{...iS,textAlign:"left"}}/></td>
              <td style={{...TD,width:100}}><input type="number" value={v.importo} min={0} onChange={e=>up(v.id,"importo",Number(e.target.value))} style={{...iS,fontWeight:700}}/></td>
              <td style={{...TD,minWidth:130,textAlign:"left"}}><input value={v.note} onChange={e=>up(v.id,"note",e.target.value)} style={{...iS,textAlign:"left",color:"#666",fontSize:11}} placeholder="note…"/></td>
              <td style={{...TD,width:26}}><button onClick={()=>setCosts(p=>({...p,voci:p.voci.filter(x=>x.id!==v.id)}))} style={{background:"none",border:"none",color:"#dc2626",fontSize:14,cursor:"pointer",fontWeight:900}}>×</button></td>
            </tr>
          ))}</tbody>
        </table>
      </div>);
    })}
    <button onClick={()=>{const c=window.prompt("Nome nuova categoria:");if(c)setCosts(p=>({...p,voci:[...p.voci,{id:uid(),cat:c.trim(),label:"Nuova voce",importo:0,note:""}]}));}} style={{padding:"7px 14px",border:"1px solid #000",background:"#fff",fontSize:12,cursor:"pointer",fontWeight:600}}>+ Nuova categoria</button>
    <div style={{marginTop:12,background:"#111",color:"#fff",padding:12,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,fontWeight:700}}>TOTALE COSTI FISSI</span><span style={{fontSize:20,fontWeight:900,color:"#fca5a5"}}>{E(tot)}</span></div>
  </div>);
}

  const sv=useMemo(()=>calcServizi(data),[data]);

    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Nome","Città","Settimana","Giorni","Tariffa","Totale"],...sv.navRows.map(r=>[r.bambino,r.citta,r.settimana,r.giorni,NAV_RATE,r.totale]),["","","","","TOTALE",sv.totNav]]),"Navette");

    const tF=costs.voci.reduce((s,v)=>s+v.importo,0);

            const pCost=pc*PASTI_RATE;
            const nDays=r.nav?wks.length*GIORNI_SETT:0;
            const nCost=nDays*NAV_RATE;
            const totDov=(r.quota||0)+pCost+nCost;
            rows.push([r.bambino,r.citta,r.eta,r.sett,r.nav?"Sì":"No",r.pasto_casa?"Sacco":"Mensa",pc,pCost,nDays,nCost,r.quota||0,totDov,r.acconto||0,r.saldato||0,r.da_saldare||0,r.stato,r.telefono,r.genitore,r.note_bimbo]);
          });
          const totRow=["TOTALE","","","","","",rows.slice(1).reduce((s,r)=>s+r[6],0),rows.slice(1).reduce((s,r)=>s+r[7],0),rows.slice(1).reduce((s,r)=>s+r[8],0),rows.slice(1).reduce((s,r)=>s+r[9],0),rows.slice(1).reduce((s,r)=>s+r[10],0),rows.slice(1).reduce((s,r)=>s+r[11],0),rows.slice(1).reduce((s,r)=>s+r[12],0),rows.slice(1).reduce((s,r)=>s+r[13],0),rows.slice(1).reduce((s,r)=>s+r[14],0),"","","",""];
          rows.push(totRow);
          const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),"Riepilogo");
          XLSX.writeFile(wb,`Riepilogo_Bambini_${new Date().toISOString().slice(0,10)}.xlsx`);
          showToast("Riepilogo per bambino esportato");
        }} style={{padding:10,border:"2px solid #7c3aed",background:"#7c3aed",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",width:"100%"}}>⬇ Scarica Riepilogo</button>
      </div>
      <div style={{background:"#fff",border:"1px solid #000",padding:20}}>
        <div style={{fontSize:28,marginBottom:8}}>💾</div>
        <div style={{fontWeight:800,fontSize:14,marginBottom:8}}>Backup JSON</div>
        <div style={{fontSize:12,color:"#666",marginBottom:16,lineHeight:1.5}}>Scarica un backup completo (iscritti + costi) in formato JSON. Puoi ripristinarlo in caso di problemi.</div>
        <button onClick={backup} style={{padding:10,border:"1px solid #000",background:"#166534",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",width:"100%",marginBottom:8}}>⬇ Scarica Backup</button>
        <label style={{display:"block",padding:10,border:"1px dashed #000",background:"#fafafa",fontSize:12,fontWeight:600,cursor:"pointer",textAlign:"center",color:"#666"}}>
          ⬆ Ripristina da backup
          <input ref={fileRef} type="file" accept=".json" onChange={restore} style={{display:"none"}}/>
        </label>
      </div>
    </div>
  </div>);
}

/* ══ APP PRINCIPALE ══════════════════════════════════════════ */
function MainApp({onLogout}){
  const[data,setData]=useState([]);
  const[costs,setCosts]=useState(DEFAULT_COSTS);
  const[tab,setTab]=useState("iscritti");
  const[toast,setToast]=useState(null);
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState(false);
  const[lastSaved,setLastSaved]=useState(null);
  const[snap,setSnap]=useState("[]");
  const[draft,setDraft]=useState(null);
  const[globalQ,setGlobalQ]=useState("");
  const[extCerca,setExtCerca]=useState("");
  const[savedMappings,setSavedMappings]=useState({});
  const[trash,setTrash]=useState([]);
  const[serverTs,setServerTs]=useState(null);
  const showToast=useCallback((msg,type="ok")=>setToast({msg,type}),[]);
  const hasChanges=useMemo(()=>JSON.stringify(data)!==snap,[data,snap]);

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try{
        const{data:rows,error}=await SB.from("iscritti").select("*").order("bambino");
        if(error)throw error;
        if(!error&&rows&&rows.length>0){
          const p=rows.map(r=>({...r,quota:Number(r.quota||0),acconto:Number(r.acconto||0),saldato:Number(r.saldato||0),da_saldare:Number(r.da_saldare||0),eta:Number(r.eta||0),sett:Number(r.sett||1),nav:!!r.nav,pasto_casa:!!r.pasto_casa,n_pasti:0,presenze:{},pasti_log:{}}));
          setData(p);setSnap(JSON.stringify(p));
        }else{
          setData(INITIAL_DATA);setSnap(JSON.stringify(INITIAL_DATA));
        }
        const{data:cfg}=await SB.from("config").select("*").eq("chiave","costs").single();
        if(cfg?.valore)setCosts(cfg.valore);
        if(rows?.length>0){const maxTs=rows.reduce((m,r)=>r.updated_at>m?r.updated_at:m,"");setServerTs(maxTs);}
        let extraValore=null;
        const{data:extraCfg}=await SB.from("config").select("*").eq("chiave","extra_data").single();
        if(extraCfg?.valore&&Object.keys(extraCfg.valore).length>0){extraValore=extraCfg.valore;}
        else{const{data:backupCfg}=await SB.from("config").select("*").eq("chiave","extra_data_backup").single();
          if(backupCfg?.valore&&Object.keys(backupCfg.valore).length>0){extraValore=backupCfg.valore;showToast("Dati pasti/presenze ripristinati da backup","warn");}
          else{try{const ls=localStorage.getItem("macaranga_extra_data");if(ls){extraValore=JSON.parse(ls);showToast("Dati pasti/presenze ripristinati da cache locale","warn");}}catch(e){}}
        }
        if(extraValore){setData(prev=>prev.map(r=>{const e=extraValore[r.id];return e?{...r,presenze:e.presenze||{},pasti_log:e.pasti_log||{},n_pasti:Object.values(e.pasti_log||{}).filter(Boolean).length}:r;}));}
      }catch(e){showToast("Errore caricamento: "+e.message,"error");}
      setLoading(false);
    })();
  },[]);

  const handleSave=useCallback(async()=>{
    const empty=data.filter(r=>!r.bambino?.trim());
    if(empty.length>0){if(!window.confirm(`Attenzione: ${empty.length} iscritto/i senza nome. Salvare comunque?`))return;}
    setSaving(true);
    try{
      if(serverTs){
        const{data:check}=await SB.from("iscritti").select("updated_at").order("updated_at",{ascending:false}).limit(1);
        if(check?.[0]?.updated_at&&check[0].updated_at>serverTs){
          if(!window.confirm("Attenzione: i dati sono stati modificati da un'altra sessione. Sovrascrivere?")){{setSaving(false);return;}}
        }
      }
      if(data.length>0){
        const cleanData=data.map(r=>{const{_tipo,n_pasti,presenze,pasti_log,...rest}=r;return{...rest,updated_at:new Date().toISOString()};});const{error}=await SB.from("iscritti").upsert(cleanData);
        if(error)throw error;
        const ids=data.map(r=>r.id);
        await SB.from("iscritti").delete().not("id","in",`(${ids.map(i=>`"${i}"`).join(",")})`);
      }else{
        await SB.from("iscritti").delete().neq("id","__never__");
      }
      await SB.from("config").upsert([{chiave:"costs",valore:costs,updated_at:new Date().toISOString()}]);
      const extraData={};data.forEach(r=>{if(r.presenze&&Object.keys(r.presenze).length>0||r.pasti_log&&Object.keys(r.pasti_log).length>0){extraData[r.id]={presenze:r.presenze||{},pasti_log:r.pasti_log||{}};}});
      const ts_now=new Date().toISOString();
      await SB.from("config").upsert([{chiave:"extra_data",valore:extraData,updated_at:ts_now}]);
      await SB.from("config").upsert([{chiave:"extra_data_backup",valore:extraData,updated_at:ts_now}]);
      try{localStorage.setItem("macaranga_extra_data",JSON.stringify(extraData));}catch(e){}
      const ts=new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});
      setSnap(JSON.stringify(data));setLastSaved(ts);setServerTs(ts_now);
      showToast(`✓ Salvato su database alle ${ts} · ${data.length} iscritti`);
    }catch(e){showToast("Errore: "+e.message,"error");}
    setSaving(false);
  },[data,costs,showToast]);

  const savingRef=useRef(false);
  useEffect(()=>{savingRef.current=saving;},[saving]);
  useEffect(()=>{if(!hasChanges)return;const t=setTimeout(()=>{if(!savingRef.current)handleSave();},30000);return()=>clearTimeout(t);},[data,costs,hasChanges,handleSave]);
  useEffect(()=>{const h=e=>{if(hasChanges){e.preventDefault();e.returnValue="";}};window.addEventListener("beforeunload",h);return()=>window.removeEventListener("beforeunload",h);},[hasChanges]);
  useEffect(()=>{const h=e=>{if((e.ctrlKey||e.metaKey)&&e.key==="s"){e.preventDefault();handleSave();}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[handleSave]);
  const handleReset=()=>{if(window.confirm("Annullare le modifiche?"))setData(JSON.parse(snap));};
  const handleLogout=async()=>{await SB.auth.signOut();onLogout();};
  const handleSync=useCallback(records=>{
    setData(prev=>{const upd=[...prev];
      records.forEach(rec=>{if(rec.type==="update"){const idx=upd.findIndex(r=>r.id===rec.record.id);if(idx>=0){const existing=upd[idx];upd[idx]={...rec.record,presenze:existing.presenze||{},pasti_log:existing.pasti_log||{},n_pasti:existing.n_pasti||0};}}else upd.push(rec.record);});
      return upd;
    });
  },[]);
  const handleDraftReady=useCallback(record=>{setDraft(record);showToast("PDF letto — revisiona la bozza prima di salvare","warn");},[showToast]);
  const handleCommitDraft=useCallback((type,record)=>{
    setData(prev=>{if(type==="update")return prev.map(r=>r.id===record.id?record:r);return[...prev,record];});
    setDraft(null);
    showToast(`✓ ${record.bambino} integrato${record.nav?" · navetta sync":""}${!record.pasto_casa?" · pasti sync":""} · BEP aggiornato`);
  },[showToast]);
  const sv=useMemo(()=>calcServizi(data),[data]);
  const incompleti=data.filter(isIncomplete).length;
  const allergici=data.filter(r=>noteType(r.note_bimbo)).length;
  const totPastiGG=useMemo(()=>data.reduce((s,r)=>s+Object.values(r.pasti_log||{}).filter(Boolean).length,0),[data]);
  const totIncassato=useMemo(()=>data.reduce((s,r)=>s+(r.stato==="SALDATO"?r.quota||0:(r.acconto||0)+(r.saldato||0)),0),[data]);
  const totResiduo=useMemo(()=>data.reduce((s,r)=>s+(r.da_saldare||0),0),[data]);
  const gRes=useMemo(()=>{if(!globalQ.trim()||globalQ.length<2)return[];const q=globalQ.toLowerCase();return data.filter(r=>[r.bambino,r.genitore,r.citta,r.note_bimbo].some(v=>String(v||"").toLowerCase().includes(q))).slice(0,8);},[globalQ,data]);
  const TABS=[
    {id:"import",l:"🤖 Import Smart"},
    {id:"iscritti",l:"Iscritti & Pagamenti"},
    {id:"nav_contab",l:"🚐 Cont. Navette"},
    {id:"pasti_contab",l:"🍽 Cont. Pasti"},
    {id:"finanziario",l:"Finanziario & BEP"},
    {id:"educatori",l:"👩‍🏫 Educatori"},
    {id:"costi",l:"Costi"},
    {id:"navette",l:"Navette"},
    {id:"export",l:"Export"},
  ];
  const tS=on=>({padding:"9px 13px",border:"none",background:"transparent",borderBottom:on?"3px solid #111":"3px solid transparent",color:on?"#111":"#888",fontWeight:on?700:400,cursor:"pointer",fontSize:12,whiteSpace:"nowrap",marginBottom:-2});

  if(loading)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16}}>
    <div style={{fontSize:36}}>🌿</div><div style={{fontSize:14,color:"#666"}}>Caricamento dati…</div>
  </div>);

  return(<div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",padding:"1rem",background:"#fafafa",minHeight:"100vh"}}>
    {toast&&<Toast msg={toast.msg} type={toast.type||"ok"} onDone={()=>setToast(null)}/>}
    {draft&&<DraftEditorPanel draft={draft} existingData={data} onCommit={handleCommitDraft} onDiscard={()=>{setDraft(null);showToast("Bozza scartata","warn");}} showToast={showToast}/>}
    <div style={{marginBottom:"0.75rem",borderBottom:"2px solid #000",paddingBottom:10,display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
      <div>
        <h1 style={{fontSize:18,fontWeight:900,letterSpacing:"-0.02em",margin:"0 0 2px"}}>🌿 Campi Natura Macaranga 2026</h1>
        <div style={{fontSize:11,color:"#666",display:"flex",gap:10,flexWrap:"wrap"}}>
          <span style={{fontWeight:700}}>{data.length} iscritti</span>
          <span>🍽 {totPastiGG} pasti</span>
          <span style={{color:"#1e40af"}}>🚐 {E(sv.totNav)}</span>
          <span style={{color:"#166534"}}>🍽 {E(sv.totPasti)}</span>
          <span style={{color:"#166534",fontWeight:700}}>💰 Incassato {E(totIncassato)}</span>
          <span style={{color:totResiduo>0?"#dc2626":"#166534",fontWeight:700}}>Residuo {E(totResiduo)}</span>
          {incompleti>0&&<span style={{color:"#d97706",fontWeight:700}}>⚠ {incompleti} incompleti</span>}
          {allergici>0&&<span style={{color:"#dc2626",fontWeight:700}}>🚨 {allergici} allergie</span>}
        </div>
      </div>
      <div style={{position:"relative"}}>
        <input value={globalQ} onChange={e=>setGlobalQ(e.target.value)} placeholder="🔍 Cerca…" style={{padding:"7px 12px",fontSize:12,border:"1px solid #000",background:"#fff",width:200}}/>
        {gRes.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #000",zIndex:200,boxShadow:"0 4px 12px rgba(0,0,0,.15)"}}>
          {gRes.map(r=><div key={r.id} onClick={()=>{setTab("iscritti");setExtCerca(globalQ);setGlobalQ("");}} style={{padding:"7px 10px",borderBottom:"0.5px solid #eee",cursor:"pointer",fontSize:12}} onMouseEnter={e=>e.currentTarget.style.background="#f5f5f3"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
            <span style={{fontWeight:700}}>{r.bambino}</span><span style={{color:"#888",marginLeft:8,fontSize:11}}>{r.citta} · {r.stato}</span>
          </div>)}
        </div>}
      </div>
    </div>
    <SaveBar hasChanges={hasChanges} saving={saving} onSave={handleSave} onReset={handleReset} lastSaved={lastSaved} onLogout={handleLogout}/>
    <div style={{display:"flex",gap:0,borderBottom:"2px solid #000",marginBottom:"1.25rem",overflowX:"auto"}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={tS(tab===t.id)}>{t.l}</button>)}
    </div>
    {tab==="import"       && <TabImport onSync={handleSync} existingData={data} showToast={showToast} onDraftReady={handleDraftReady} savedMappings={savedMappings} setSavedMappings={setSavedMappings}/>}
    {tab==="iscritti"    && <TabIscritti data={data} setData={setData} showToast={showToast} extCerca={extCerca} onExtCercaUsed={()=>setExtCerca("")} navCap={costs?.navCap||NAV_CAP} trash={trash} setTrash={setTrash}/>}
    {tab==="nav_contab"  && <TabNavetteContab data={data} giorniSett={5} showToast={showToast}/>}
    {tab==="pasti_contab"&& <TabPastiContab data={data} setData={setData} giorniSett={5} showToast={showToast}/>}
    {tab==="finanziario" && <TabFinanziario data={data} costs={costs} setCosts={setCosts} showToast={showToast}/>}
    {tab==="educatori"   && <TabEducatori data={data} costs={costs} setCosts={setCosts}/>}
    {tab==="costi"       && <TabCosti costs={costs} setCosts={setCosts}/>}
    {tab==="navette"     && <TabNavette data={data} costs={costs} setCosts={setCosts} onAddNav={(id,citta)=>{
      setData(prev=>prev.map(r=>r.id===id?{...r,nav:true,citta:citta}:r));
      showToast("Iscritto aggiunto alla navetta "+citta);
    }}/>}
    {tab==="export"      && <TabExport data={data} costs={costs} showToast={showToast} setData={setData} setCosts={setCosts}/>}
  </div>);
}

/* ══ ROOT ════════════════════════════════════════════════════ */
function Root(){
  const[session,setSession]=useState(null);
  const[checking,setChecking]=useState(true);
  useEffect(()=>{
    SB.auth.getSession().then(({data:{session}})=>{setSession(session);setChecking(false);});
    const{data:{subscription}}=SB.auth.onAuthStateChange((_,s)=>setSession(s));
    return()=>subscription.unsubscribe();
  },[]);
  if(checking)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}><div style={{fontSize:14,color:"#666"}}>Verifica sessione…</div></div>);
  if(!session)return<Login onLogin={()=>SB.auth.getSession().then(({data:{session}})=>setSession(session))}/>;
  return<MainApp onLogout={()=>setSession(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
