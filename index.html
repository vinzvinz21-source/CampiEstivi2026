const E2=v=>Number(v||0).toLocaleString("it-IT",{style:"currency",currency:"EUR",minimumFractionDigits:2,maximumFractionDigits:2});
const calcWeeks=(inizio,sett)=>{const s=DAL_TO_SETT[inizio];if(!s)return[];return Array.from({length:sett},(_,i)=>s+i).filter(w=>w>=1&&w<=8);};
const calcResidue=r=>Math.max(0,(r.quota||0)-(r.acconto||0)-(r.saldato||0));
const autoStato=r=>{const res=calcResidue(r);if(res===0&&((r.saldato||0)>0||(r.acconto||0)>=(r.quota||0)))return"SALDATO";if((r.acconto||0)>0||(r.saldato||0)>0)return"ACCONTO";return"DA PAGARE";};
const AKW=["lattosio","glutin","celiac","allergi","latte","uova","pesce","noci","arachid","epipen","fans"];
const MKW=["autist","epiless","diabeti","asma","cardiop","sindrome","disabilit","iperattiv","adhd"];
const noteType=note=>{if(!note?.trim())return null;const l=note.toLowerCase();if(MKW.some(k=>l.includes(k)))return"medica";if(AKW.some(k=>l.includes(k)))return"allergia";return"nota";};
const NST={allergia:{bg:"#fef2f2",border:"2px solid #dc2626",col:"#991b1b",icon:"🚨"},medica:{bg:"#fff7ed",border:"2px solid #ea580c",col:"#9a3412",icon:"⚕️"},nota:{bg:"#fefce8",border:"1px solid #ca8a04",col:"#854d0e",icon:"📋"}};
const isIncomplete=r=>!r.bambino?.trim()||!r.telefono?.trim()||!r.genitore?.trim();
const SBG={SALDATO:"#dcfce7",ACCONTO:"#fef9c3","DA PAGARE":"#fee2e2"};
const SCL={SALDATO:"#166534",ACCONTO:"#854d0e","DA PAGARE":"#991b1b"};

function calcServizi(data){
  const nR=[];const pR=[];
  data.forEach(r=>{
    if(!r.bambino?.trim())return;
    calcWeeks(r.inizio,r.sett).forEach(sid=>{
      const w=WEEKS.find(x=>x.id===sid);
      if(r.nav)nR.push({id:r.id,bambino:r.bambino,citta:r.citta,settimana:w?.label||"—",settRange:w?.range||"—",giorni:GIORNI_SETT,totale:GIORNI_SETT*NAV_RATE});
      if(!r.pasto_casa)pR.push({id:r.id,bambino:r.bambino,citta:r.citta,settimana:w?.label||"—",settRange:w?.range||"—",giorni:GIORNI_SETT,totale:GIORNI_SETT*PASTI_RATE});
    });
  });
  const tN=nR.reduce((s,r)=>s+r.totale,0);const tP=pR.reduce((s,r)=>s+r.totale,0);
  return{navRows:nR,pastiRows:pR,totNav:tN,totPasti:tP,totExtra:tN+tP};
}

function useSorted(data){
  const[sf,setSf]=useState("bambino");const[sd,setSd]=useState(1);
  const toggle=k=>{if(sf===k)setSd(d=>-d);else{setSf(k);setSd(1);}};
  const sorted=useMemo(()=>[...data].sort((a,b)=>{const av=a[sf],bv=b[sf];return typeof av==="number"?(av-bv)*sd:String(av||"").localeCompare(String(bv||""))*sd;}),[data,sf,sd]);
  const STH=({col,label,style={}})=>(<th onClick={()=>toggle(col)} style={{background:"#111",color:"#fff",padding:"7px 8px",border:"1px solid #000",textAlign:"center",fontWeight:600,fontSize:11,whiteSpace:"nowrap",cursor:"pointer",userSelect:"none",...style}}>{label}{sf===col?(sd===1?" ↑":" ↓"):" ·"}</th>);
  return{sorted,STH};
}

/* ══ MAPPING ════════════════════════════════════════════════════ */
const SCHEMA_FIELDS={bambino:{label:"Nome bambino"},nato_il:{label:"Data nascita"},eta:{label:"Età"},inizio:{label:"Data inizio"},fine:{label:"Data fine"},sett:{label:"N° settimane"},nav:{label:"Navetta"},pasto_casa:{label:"Pranzo al sacco"},citta:{label:"Città"},quota:{label:"Quota €"},acconto:{label:"Acconto €"},saldato:{label:"Saldato €"},stato:{label:"Stato pagamento"},note_pag:{label:"Note pagamento"},note_bimbo:{label:"Note mediche"},telefono:{label:"Telefono"},genitore:{label:"Genitore"},_ignore:{label:"— Ignora —"}};
const MAPPING_DICT=[
  {pat:/bambino|partecipant|nome.*(bamb|part)|child|nominativo|name/i,field:"bambino"},
  {pat:/navett|trasferiment|bus|pullman|shuttle|\+\s*tras|servizio.*(bus|tras)|pick.?up/i,field:"nav"},
  {pat:/pranzo.*(sacco|casa)|pasto.*(casa|sacco)|porta.*(pasto|pranzo)|sacco/i,field:"pasto_casa"},
  {pat:/nato|nascita|birth|born/i,field:"nato_il"},
  {pat:/inizio|arrivo|start|dal\b/i,field:"inizio"},
  {pat:/fine|partenza|end|al\b/i,field:"fine"},
  {pat:/sett(imane)?\.?|weeks?|durata/i,field:"sett"},
  {pat:/et[àa]|age|anni/i,field:"eta"},
  {pat:/citt[àa]|comune|localit|provenienza/i,field:"citta"},
  {pat:/quota|importo|totale.*quota|costo.*tot/i,field:"quota"},
  {pat:/acconto|anticipo|deposit|caparra/i,field:"acconto"},
  {pat:/saldat|pagat|versato|paid|saldo\b/i,field:"saldato"},
  {pat:/stat(o|us).*pag/i,field:"stato"},
  {pat:/allergi|medic|disab|patolog|dieta|intolleranz|sanitari/i,field:"note_bimbo"},
  {pat:/note.*pag|pag.*note/i,field:"note_pag"},
  {pat:/telefon|cell|mobile|phone/i,field:"telefono"},
  {pat:/genitor|parent|tutore|referente|madre|padre/i,field:"genitore"},
];
const isTrasf=v=>String(v||"").toLowerCase().replace(/\s/g,"").match(/trasferiment|navett|bus|pullman|shuttle/);
const parseBool=v=>{const s=String(v||"").toLowerCase().trim();return["si","sì","yes","✓","x","true","1","incluso","presente"].includes(s)||!!isTrasf(s);};
const parseDate=v=>{if(!v)return"";if(typeof v==="object"&&v instanceof Date)return`${String(v.getDate()).padStart(2,"0")}/${String(v.getMonth()+1).padStart(2,"0")}/${v.getFullYear()}`;if(typeof v==="number"&&v>1000){const d=new Date(Math.round((v-25569)*864e5));return`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;}const s=String(v).trim();if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s))return s;const iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(iso)return`${iso[3]}/${iso[2]}/${iso[1]}`;return s;};
const parseNum=v=>{const n=parseFloat(String(v||"").replace(",","."));return isNaN(n)?0:n;};
const parseStato=v=>{const s=String(v||"").toUpperCase();if(s.includes("SALD"))return"SALDATO";if(s.includes("ACC")||s.includes("PART"))return"ACCONTO";return"DA PAGARE";};
function autoMapHeaders(headers,saved={}){
  const result={};const mapped=new Set();
  headers.forEach(h=>{const k=String(h).trim();if(!k)return;
    if(saved[k.toLowerCase()]){result[k]=saved[k.toLowerCase()];mapped.add(k);return;}
    const found=MAPPING_DICT.find(e=>e.pat.test(k));
    if(found&&!Object.values(result).includes(found.field)){result[k]=found.field;mapped.add(k);}
  });
  return{result,unmapped:headers.filter(h=>h&&!mapped.has(String(h).trim()))};
}
function buildRecord(raw,mapping){
  const base={id:uid(),bambino:"",nato_il:"",eta:0,inizio:"08/06/2026",fine:"03/07/2026",sett:1,nav:false,pasto_casa:false,citta:"",quota:0,acconto:0,saldato:0,da_saldare:0,stato:"DA PAGARE",note_pag:"",note_bimbo:"",telefono:"",genitore:""};
  if(Object.values(raw).some(v=>isTrasf(v)))base.nav=true;
  Object.entries(mapping).forEach(([h,f])=>{
    if(f==="_ignore"||!f)return;const val=raw[h];if(val===undefined||val===null||val==="")return;
    if(f==="bambino")base.bambino=String(val).trim();
    else if(f==="nato_il")base.nato_il=parseDate(val);
    else if(f==="eta")base.eta=parseNum(val);
    else if(f==="inizio")base.inizio=parseDate(val);
    else if(f==="fine")base.fine=parseDate(val);
    else if(f==="sett")base.sett=Math.max(1,parseNum(val));
    else if(f==="nav")base.nav=base.nav||parseBool(val);
    else if(f==="pasto_casa")base.pasto_casa=parseBool(val);
    else if(f==="citta")base.citta=String(val).trim();
    else if(f==="quota")base.quota=parseNum(val);
    else if(f==="acconto")base.acconto=parseNum(val);
    else if(f==="saldato")base.saldato=parseNum(val);
    else if(f==="stato")base.stato=parseStato(val);
    else if(f==="note_pag")base.note_pag=String(val).trim();
    else if(f==="note_bimbo")base.note_bimbo=String(val).trim();
    else if(f==="telefono")base.telefono=String(val).replace(/'/g,"").trim();
    else if(f==="genitore")base.genitore=String(val).trim();
  });
  base.da_saldare=calcResidue(base);base.stato=autoStato(base);
  return base;
}



/* ── CONFLICT RESOLVER ── */
function ConflictResolver({data,onConfirm,onCancel}){
  const[decisions,setDecisions]=useState(()=>Object.fromEntries(data.conflicts.map(c=>[c.existing.id,"update"])));
  const finalize=()=>{
    const finalAdd=[...data.toAdd];
    const finalUpdate=[];
    data.conflicts.forEach(c=>{
      if(decisions[c.existing.id]==="update"){
        const merged={...c.existing,...c.incoming,id:c.existing.id,da_saldare:calcResidue({...c.existing,...c.incoming}),stato:autoStato({...c.existing,...c.incoming})};
        finalUpdate.push(merged);
      }else{
        finalAdd.push({...c.incoming,id:uid()});
      }
    });
    onConfirm(finalAdd,finalUpdate);
  };
  return(<div>
    {data.toAdd.length>0&&<div style={{padding:"8px 12px",background:"#f0fdf4",border:"1px solid #16a34a",marginBottom:10,fontSize:12,fontWeight:600}}>✓ {data.toAdd.length} nuovi iscritti pronti per l'aggiunta</div>}
    {data.conflicts.length>0&&<div style={{marginBottom:14}}>
      <div style={{padding:"8px 12px",background:"#fef3c7",border:"1px solid #d97706",marginBottom:8,fontSize:12,fontWeight:600,color:"#92400e"}}>⚠ {data.conflicts.length} conflitti: iscritti con lo stesso nome già presenti nel database</div>
      {data.conflicts.map(c=>(
        <div key={c.existing.id} style={{background:"#fff",border:"1px solid #000",padding:12,marginBottom:8}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>👤 {c.existing.bambino}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10,fontSize:12}}>
            <div style={{background:"#f5f5f3",padding:8}}><div style={{fontWeight:700,marginBottom:4,color:"#555"}}>Dati attuali nel DB</div>
              {Object.entries(c.changed).map(([k])=><div key={k} style={{padding:"2px 0"}}><span style={{color:"#888"}}>{k}:</span> <span style={{fontWeight:600}}>{String(c.existing[k])}</span></div>)}
            </div>
            <div style={{background:"#fef9c3",padding:8}}><div style={{fontWeight:700,marginBottom:4,color:"#854d0e"}}>Dati nel file caricato</div>
              {Object.entries(c.changed).map(([k,v])=><div key={k} style={{padding:"2px 0"}}><span style={{color:"#888"}}>{k}:</span> <span style={{fontWeight:600,color:"#854d0e"}}>{String(v)}</span></div>)}
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setDecisions(d=>({...d,[c.existing.id]:"update"}))} style={{flex:1,padding:"7px",border:`2px solid ${decisions[c.existing.id]==="update"?"#16a34a":"#ccc"}`,background:decisions[c.existing.id]==="update"?"#f0fdf4":"#fff",cursor:"pointer",fontWeight:decisions[c.existing.id]==="update"?700:400,fontSize:12}}>↻ Aggiorna iscrizione esistente</button>
            <button onClick={()=>setDecisions(d=>({...d,[c.existing.id]:"new"}))} style={{flex:1,padding:"7px",border:`2px solid ${decisions[c.existing.id]==="new"?"#185FA5":"#ccc"}`,background:decisions[c.existing.id]==="new"?"#eff6ff":"#fff",cursor:"pointer",fontWeight:decisions[c.existing.id]==="new"?700:400,fontSize:12}}>+ Crea nuova iscrizione separata</button>
          </div>
        </div>
      ))}
    </div>}
    <div style={{display:"flex",gap:10,justifyContent:"flex-end",borderTop:"1px solid #e0e0e0",paddingTop:12}}>
      <button onClick={onCancel} style={{padding:"8px 16px",border:"1px solid #000",background:"#fff",cursor:"pointer"}}>Annulla</button>
      <button onClick={finalize} style={{padding:"8px 22px",border:"1px solid #000",background:"#16a34a",color:"#fff",cursor:"pointer",fontWeight:700}}>✓ Conferma e Integra — {data.toAdd.length+data.conflicts.length} iscritti</button>
    </div>
  </div>);
}



/* ══ DRAFT EDITOR PANEL ═════════════════════════════════════════
   Schema row estratta dal PDF → bozza editabile prima del commit.
   Il record NON entra nel DB finché l'operatore non preme "Applica".
   Tutto si aggiorna a cascata solo dopo il commit.
*/
function DraftEditorPanel({draft,existingData,onCommit,onDiscard,showToast}){
  const[r,setR]=useState(()=>({...draft}));
  const upd=(k,v)=>setR(prev=>{
    const u={...prev,[k]:v};
    if(["quota","acconto","saldato"].includes(k)){u.da_saldare=calcResidue(u);u.stato=autoStato(u);}
    return u;
  });

  // Rileva conflitto
  const existing=existingData.find(e=>e.bambino.toLowerCase().trim()===r.bambino.toLowerCase().trim());
  const isConflict=!!existing;
  const[conflictMode,setConflictMode]=useState("update"); // "update"|"new"

  const nt=noteType(r.note_bimbo);const ns=nt?NST[nt]:null;
  const inpS={padding:"7px 10px",fontSize:13,border:"1px solid #000",background:"#fff",width:"100%"};
  const lbl=(t)=><label style={{fontSize:11,fontWeight:600,color:"#555",display:"block",marginBottom:4}}>{t}</label>;

  const commit=()=>{
    const finalRecord={...r,id:conflictMode==="update"&&existing?existing.id:uid(),da_saldare:calcResidue(r),stato:autoStato(r)};
    const type=conflictMode==="update"&&existing?"update":"add";
    onCommit(type,finalRecord);
  };

  return(
    <div style={{position:"fixed",inset:0,zIndex:9997,background:"rgba(0,0,0,0.65)",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"16px 16px 0",overflowY:"auto"}}>
      <div style={{background:"#fff",border:"2px solid #000",padding:0,maxWidth:720,width:"100%",marginBottom:16}}>
        {/* HEADER */}
        <div style={{background:"#111",color:"#fff",padding:"12px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:900,fontSize:15}}>📋 Revisione Nuova Iscrizione — Bozza da PDF</div>

          <span style={{padding:"3px 10px",background:"#fef9c3",color:"#854d0e",fontWeight:700,fontSize:11,border:"1px solid #d97706"}}>BOZZA — non salvata</span>

        {/* CONFLITTO */}
        {isConflict&&<div style={{padding:"10px 18px",background:"#fef3c7",border:"1px solid #d97706",borderLeft:"none",borderRight:"none",fontSize:12}}>
          <span style={{fontWeight:700,color:"#92400e"}}>⚠ "{r.bambino}" è già presente nel database. </span>
          <span style={{color:"#92400e"}}>Scegli come procedere:</span>
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <button onClick={()=>setConflictMode("update")} style={{padding:"6px 14px",border:`2px solid ${conflictMode==="update"?"#16a34a":"#ccc"}`,background:conflictMode==="update"?"#f0fdf4":"#fff",cursor:"pointer",fontWeight:conflictMode==="update"?700:400,fontSize:12}}>↻ Aggiorna iscrizione esistente</button>
            <button onClick={()=>setConflictMode("new")} style={{padding:"6px 14px",border:`2px solid ${conflictMode==="new"?"#185FA5":"#ccc"}`,background:conflictMode==="new"?"#eff6ff":"#fff",cursor:"pointer",fontWeight:conflictMode==="new"?700:400,fontSize:12}}>+ Crea nuova iscrizione separata</button>
          </div>
        </div>}

        <div style={{padding:18}}>
          {/* RIGA 1: nome + genitore + telefono */}
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:12,marginBottom:12}}>
            <div>{lbl("Nome bambino/a *")}<input value={r.bambino} onChange={e=>upd("bambino",e.target.value)} style={{...inpS,fontWeight:700}}/></div>
            <div>{lbl("Genitore / tutore *")}<input value={r.genitore} onChange={e=>upd("genitore",e.target.value)} style={inpS}/></div>
            <div>{lbl("Telefono *")}<input value={r.telefono} onChange={e=>upd("telefono",e.target.value.replace(/'/g,""))} style={{...inpS,color:!r.telefono?"#d97706":"inherit"}}/></div>
          </div>
          {/* RIGA 2: nascita + età + città */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 2fr",gap:12,marginBottom:12}}>
            <div>{lbl("Data di nascita")}<input value={r.nato_il} onChange={e=>upd("nato_il",e.target.value)} style={inpS} placeholder="dd/mm/yyyy"/></div>
            <div>{lbl("Età")}<input type="number" value={r.eta} min={0} max={18} onChange={e=>upd("eta",Number(e.target.value))} style={inpS}/></div>
            <div>{lbl("Città")}<select value={r.citta||""} onChange={e=>upd(r.id,"citta",e.target.value)} style={{...inpS,cursor:"pointer",fontSize:11}}>{CITTA_OPTIONS.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
          </div>
          {/* RIGA 3: settimane */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
            <div>{lbl("Data inizio")}<select value={r.inizio} onChange={e=>upd("inizio",e.target.value)} style={{...inpS,cursor:"pointer"}}>
              {WEEKS.map(w=><option key={w.id} value={w.dal}>{w.dal} ({w.label})</option>)}</select></div>
            <div>{lbl("N° settimane")}<input type="number" value={r.sett} min={1} max={8} onChange={e=>upd("sett",Number(e.target.value))} style={inpS}/></div>
            <div style={{display:"flex",flexDirection:"column",justifyContent:"flex-end",gap:6,paddingBottom:1}}>
              <div style={{display:"flex",gap:12}}>
                <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12,fontWeight:600,userSelect:"none"}}>
                  <input type="checkbox" checked={r.nav} onChange={e=>upd("nav",e.target.checked)} style={{width:16,height:16,cursor:"pointer"}}/>
                  <span style={{background:r.nav?"#1e40af":"#e5e7eb",color:r.nav?"#fff":"#888",padding:"2px 8px",fontWeight:r.nav?700:400}}>🚐 Navetta</span>
                </label>
                <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12,fontWeight:600,userSelect:"none"}}>
                  <input type="checkbox" checked={r.pasto_casa} onChange={e=>upd("pasto_casa",e.target.checked)} style={{width:16,height:16,cursor:"pointer"}}/>
                  <span style={{background:r.pasto_casa?"#854d0e":"#e5e7eb",color:r.pasto_casa?"#fff":"#888",padding:"2px 8px",fontWeight:r.pasto_casa?700:400}}>🥪 Pranzo al sacco</span>
                </label>
              </div>
            </div>
          </div>
          {/* RIGA 4: pagamenti */}
          <div style={{background:"#f0fdf4",border:"1px solid #16a34a",padding:12,marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:12,marginBottom:8,color:"#166534"}}>💰 Pagamenti — Residuo calcolato in automatico</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10}}>
              <div>{lbl("Quota totale €")}<input type="number" value={r.quota} min={0} onChange={e=>upd("quota",Number(e.target.value))} style={{...inpS,fontWeight:700}}/></div>
              <div>{lbl("Acconto già versato €")}<input type="number" value={r.acconto} min={0} onChange={e=>upd("acconto",Number(e.target.value))} style={{...inpS,color:"#166534",fontWeight:700}}/></div>
              <div>{lbl("Saldo già versato €")}<input type="number" value={r.saldato} min={0} onChange={e=>upd("saldato",Number(e.target.value))} style={{...inpS,color:"#166534",fontWeight:700}}/></div>
              <div>{lbl("Residuo da saldare €")}
                <div style={{padding:"7px 10px",fontSize:13,border:`1px solid ${r.da_saldare>0?"#dc2626":"#16a34a"}`,background:r.da_saldare>0?"#fef2f2":"#f0fdf4",fontWeight:800,color:r.da_saldare>0?"#dc2626":"#166534"}}>
                  {E(r.da_saldare)} <span style={{fontSize:10,fontWeight:400}}>auto</span>
                </div>
              </div>
            </div>
            <div style={{marginTop:8,display:"flex",gap:8}}>
              {["SALDATO","ACCONTO","DA PAGARE"].map(s=>(
                <button key={s} onClick={()=>upd("stato",s)} style={{padding:"5px 12px",border:`1px solid ${r.stato===s?"#000":"#ccc"}`,background:r.stato===s?SBG[s]:"#fff",color:r.stato===s?SCL[s]:"#888",fontSize:11,cursor:"pointer",fontWeight:r.stato===s?700:400}}>{s}</button>
              ))}
            </div>
          </div>
          {/* RIGA 5: note mediche */}
          <div style={{marginBottom:12}}>
            {lbl("🚨 Allergie / Note mediche / Patologie")}
            <input value={r.note_bimbo} onChange={e=>upd("note_bimbo",e.target.value)} style={{...inpS,background:nt?ns.bg:"#fff",border:nt?ns.border:"1px solid #000",color:nt?ns.col:"inherit",fontWeight:nt?700:400}} placeholder="es: Lattosio, FANS, Autistico…"/>
            {nt&&<div style={{marginTop:4,fontSize:11,padding:"4px 8px",background:ns.bg,border:ns.border,color:ns.col,fontWeight:700}}>{ns.icon} {nt==="allergia"?"Allergia rilevata":"Nota medica rilevata"} — verrà evidenziata in rosso nella tabella iscritti e nelle navette</div>}
          </div>
          {/* RIGA 6: note pagamento */}
          <div style={{marginBottom:16}}>
            {lbl("Note pagamento")}
            <input value={r.note_pag} onChange={e=>upd("note_pag",e.target.value)} style={{...inpS,color:"#555"}} placeholder="es: Bonifico 15/03, acconto dividito con fratello…"/>
          </div>

          {/* RIEPILOGO CASCATA */}
          <div style={{background:"#f5f5f3",border:"1px solid #000",padding:12,marginBottom:16,fontSize:12}}>
            <div style={{fontWeight:700,marginBottom:6}}>✅ Effetti dopo "Applica e Salva"</div>
            <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
              <span>📋 Aggiunto a <strong>Tabella Iscritti</strong></span>
              {r.nav&&<span style={{color:"#1e40af",fontWeight:600}}>🚐 Aggiunto a <strong>Contabilità Navette</strong> · -1 posto disponibile</span>}
              {!r.pasto_casa&&<span style={{color:"#166534",fontWeight:600}}>🍽️ Aggiunto a <strong>Contabilità Pasti</strong></span>}
              <span style={{color:"#185FA5",fontWeight:600}}>📐 BEP e Ricavi Extra aggiornati</span>
            </div>
          </div>

          {/* BOTTONI */}
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button onClick={onDiscard} style={{padding:"10px 20px",border:"1px solid #000",background:"#fff",fontSize:13,cursor:"pointer",fontWeight:600}}>✕ Scarta bozza</button>
            <button onClick={commit} style={{padding:"10px 28px",border:"2px solid #000",background:"#16a34a",color:"#fff",fontSize:14,cursor:"pointer",fontWeight:800}}>✓ Applica e Salva Modifiche</button>
          </div>
        </div>
      </div>
    </div>
  );
}



/* ══ TAB IMPORT SMART ══════════════════════════════════════════ */
function TabImport({onSync,existingData,showToast,savedMappings,setSavedMappings,onDraftReady}){
  const[log,setLog]=useState([]);const[uploading,setUploading]=useState(false);
  const[mappingState,setMappingState]=useState(null);
  const[previewData,setPreviewData]=useState(null); // {toAdd, toUpdate, conflicts}
  const addLog=(msg,type="info")=>setLog(p=>[{msg,type,ts:new Date().toLocaleTimeString()},...p.slice(0,29)]);

  function mergeAndPreview(incoming){
    const toAdd=[];const toUpdate=[];const conflicts=[];
    incoming.forEach(r=>{
      if(!r.bambino.trim())return;
      const ex=existingData.find(e=>e.bambino.toLowerCase().trim()===r.bambino.toLowerCase().trim());
      if(ex){
        const changed={};
        ["acconto","saldato","quota","stato","note_pag","note_bimbo","nav","pasto_casa","citta","sett","inizio","fine"].forEach(k=>{if(r[k]!==undefined&&r[k]!==ex[k])changed[k]=r[k];});
        if(Object.keys(changed).length>0) conflicts.push({existing:ex,incoming:r,changed});
        else toAdd.push({...r,_tipo:"SKIP"});
      }else toAdd.push({...r,_tipo:"NUOVO"});
    });
    if(conflicts.length>0){addLog(`${conflicts.length} conflitti da risolvere`,"warn");}
    setPreviewData({toAdd:toAdd.filter(r=>r._tipo==="NUOVO"),toUpdate,conflicts});
  }

  function confirmImport(finalAdd,finalUpdate){
    const records=[...finalAdd.map(r=>({type:"add",record:r})),...finalUpdate.map(r=>({type:"update",record:r}))];
    const navSync=finalAdd.filter(r=>r.nav).length+finalUpdate.filter(r=>r.nav).length;
    onSync(records);
    showToast(`✓ ${finalAdd.length} aggiunti · ${finalUpdate.length} aggiornati · ${navSync} navette sync`);
    addLog(`✓ ${finalAdd.length} aggiunti, ${finalUpdate.length} aggiornati`,"ok");
    setPreviewData(null);setMappingState(null);
  }

  async function handleFile(file){
    if(!file||uploading)return;setUploading(true);addLog(`Caricamento: ${file.name}`);
    const ext=file.name.split(".").pop().toLowerCase();
    try{
      if(ext==="xlsx"||ext==="xls"){
        const buf=await file.arrayBuffer();const wb=XLSX.read(buf,{type:"array",cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];const rawMatrix=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        let hi=-1;for(let i=0;i<rawMatrix.length;i++){if(rawMatrix[i].some(c=>String(c).toLowerCase().match(/bambino|nome|partecipant/))){hi=i;break;}}
        if(hi<0){hi=0;}
        const headers=rawMatrix[hi].map(h=>String(h).trim()).filter(Boolean);
        addLog(`Header: ${headers.join(", ")}`);
        const{result:am,unmapped}=autoMapHeaders(headers,savedMappings);
        const trasfCol=headers.find(h=>isTrasf(h));if(trasfCol&&!am[trasfCol]){am[trasfCol]="nav";addLog(`"${trasfCol}" → navetta rilevato automaticamente`,"ok");}
        const rawRows=rawMatrix.slice(hi+1).filter(row=>row.some(c=>c!=="")).filter(row=>{const nm=String(row[0]||"").trim();return nm&&!nm.startsWith("TOTALE")&&!["Stato","SALDATI","ACCONTO","DA PAGARE"].some(x=>nm.startsWith(x));}).map(row=>{const obj={};headers.forEach((h,i)=>{obj[h]=row[i]??"";});return obj;});
        addLog(`${rawRows.length} righe estratte`);
        if(unmapped.length===0){
          const records=rawRows.map(row=>buildRecord(row,am)).filter(r=>r.bambino.trim());addLog(`Auto-sync: ${records.length} record`,"ok");mergeAndPreview(records);
        }else{
          addLog(`${unmapped.length} campi da mappare manualmente`,"warn");
          setMappingState({rawRows,headers,currentMapping:am,unmapped});
        }
      }else if(ext==="docx"){
        const buf=await file.arrayBuffer();const res=await mammoth.extractRawText({arrayBuffer:buf});
        addLog("Analisi AI Word…");
        const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true","x-api-key":localStorage.getItem("mac_api_key")||window.__ANTHROPIC_KEY__||"","anthropic-version":"2023-06-01"},body:JSON.stringify({model:"claude-sonnet-4-5-20251001",max_tokens:3000,system:`Estrai iscrizioni. SOLO JSON array senza backtick. Campi: bambino,nato_il(dd/mm/yyyy),eta,inizio(dd/mm/yyyy),fine(dd/mm/yyyy),sett,nav(bool—true se navetta/trasferimento/bus),pasto_casa(bool—true se pranzo al sacco),citta,quota,acconto,saldato,da_saldare,stato(SALDATO|ACCONTO|DA PAGARE),note_pag,note_bimbo,telefono,genitore.`,messages:[{role:"user",content:res.value}]})});
        const d=await resp.json();const txt=d.content.filter(b=>b.type==="text").map(b=>b.text).join("");
        const parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());addLog(`Claude Word: ${parsed.length} iscritti`);
        mergeAndPreview(parsed.map(r=>({...r,id:uid(),da_saldare:calcResidue(r),stato:autoStato(r)})));
      }else if(ext==="pdf"){
        const buf=await file.arrayBuffer();const bytes=new Uint8Array(buf);
        let binary="";
        const chunk=8192;
        for(let i=0;i<bytes.length;i+=chunk){
          binary+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk));
        }
        const b64=btoa(binary);
        addLog("Claude OCR PDF — estrazione in corso…");
        const pdfPrompt="Estrai i dati di iscrizione da questo PDF. Restituisci SOLO un oggetto JSON valido senza backtick. Campi: bambino, nato_il(dd/mm/yyyy), eta(int), inizio(dd/mm/yyyy), fine(dd/mm/yyyy), sett(int 1-8), nav(bool), pasto_casa(bool), citta, quota(num), acconto(num), saldato(num), da_saldare(num), stato(SALDATO|ACCONTO|DA PAGARE), note_pag, note_bimbo, telefono, genitore. Valori mancanti: vuoto o 0.";
        const pdfBody=JSON.stringify({model:"claude-sonnet-4-5-20251001",max_tokens:4000,messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:pdfPrompt}]}]});
        const pdfHeaders={"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true","x-api-key":localStorage.getItem("mac_api_key")||window.__ANTHROPIC_KEY__||"","anthropic-version":"2023-06-01"};
        const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:pdfHeaders,body:pdfBody});
        const rawResp=await resp.json();
        if(!rawResp||!rawResp.content){addLog("Errore API: "+(rawResp&&rawResp.error?rawResp.error.message:"risposta vuota"),"error");setUploading(false);return;}
        const txt=rawResp.content.filter(b=>b.type==="text").map(b=>b.text).join("");
        let parsed;
        try{
          let clean=txt.replace(/```json|```/g,"").trim();
          // Estrae il primo oggetto JSON valido dalla risposta
          const jsonMatch=clean.match(/\{[\s\S]*\}/);
          if(!jsonMatch){addLog("Nessun JSON trovato nella risposta","error");setUploading(false);return;}
          parsed=JSON.parse(jsonMatch[0]);
        }catch(pe){addLog("JSON error: "+pe.message,"error");setUploading(false);return;}
        const single=Array.isArray(parsed)?parsed[0]:parsed;
        if(!single||typeof single!=="object"){addLog("Risposta non valida","error");setUploading(false);return;}
        const record={...single,id:uid(),da_saldare:calcResidue(single),stato:autoStato(single)};
        addLog("PDF OK: "+(record.bambino||"—")+" nav:"+(record.nav?"Si":"No"),record.bambino?"ok":"warn");
        onDraftReady(record);
      }else addLog(`Formato .${ext} non supportato`,"warn");
    }catch(e){addLog(`❌ ${e.message}`,"error");console.error(e);}
    setUploading(false);
  }

  return(<div>
    {/* MAPPING REVIEW */}
    {mappingState&&<Modal title="🗺 Mapping Review" subtitle={`${mappingState.unmapped.length} colonne non riconosciute. Assegna il campo corrispondente.`} onClose={()=>setMappingState(null)} wide>
      <div style={{marginBottom:10,display:"flex",flexWrap:"wrap",gap:6}}>
        {Object.entries(mappingState.currentMapping).filter(([,f])=>!mappingState.unmapped.includes(Object.keys(mappingState.currentMapping).find(h=>mappingState.currentMapping[h]===f))).map(([h,f])=>(
          <span key={h} style={{padding:"2px 7px",background:"#f0fdf4",border:"1px solid #86efac",fontSize:11}}>{h} → <strong>{SCHEMA_FIELDS[f]?.label||f}</strong></span>
        ))}
      </div>
      <table style={{borderCollapse:"collapse",width:"100%",fontSize:12,marginBottom:14}}>
        <thead><tr><th style={{background:"#111",color:"#fff",padding:"6px 8px",border:"1px solid #000",fontSize:11,textAlign:"left"}}>Colonna nel file</th><th style={{background:"#111",color:"#fff",padding:"6px 8px",border:"1px solid #000",fontSize:11}}>Assegna a</th></tr></thead>
        <tbody>{mappingState.unmapped.map(h=>{
          const localVal=mappingState.currentMapping[h]||"_ignore";
          return(<tr key={h} style={{background:"#fef9c3"}}>
            <td style={{border:"1px solid #000",padding:"8px 10px",fontWeight:700,color:"#854d0e"}}>{h}</td>
            <td style={{border:"1px solid #000",padding:"6px 8px"}}>
              <select defaultValue={localVal} onChange={e=>{mappingState.currentMapping[h]=e.target.value;}} style={{width:"100%",padding:"5px 8px",fontSize:12,border:"1px solid #000"}}>
                {Object.entries(SCHEMA_FIELDS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
              </select>
            </td>
          </tr>);
        })}</tbody>
      </table>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <button onClick={()=>setMappingState(null)} style={{padding:"7px 14px",border:"1px solid #000",background:"#fff",cursor:"pointer"}}>Annulla</button>
        <button onClick={()=>{
          const newSaved={...savedMappings};mappingState.unmapped.forEach(h=>{if(mappingState.currentMapping[h]&&mappingState.currentMapping[h]!=="_ignore")newSaved[h.toLowerCase()]=mappingState.currentMapping[h];});
          setSavedMappings(newSaved);
          const records=mappingState.rawRows.map(row=>buildRecord(row,mappingState.currentMapping)).filter(r=>r.bambino.trim());
          mergeAndPreview(records);setMappingState(null);
        }} style={{padding:"7px 20px",border:"1px solid #000",background:"#16a34a",color:"#fff",cursor:"pointer",fontWeight:700}}>✓ Conferma e sincronizza</button>
      </div>
    </Modal>}

    {/* ANTEPRIMA IMPORTAZIONE / GESTIONE CONFLITTI */}
    {previewData&&<Modal title="📋 Anteprima importazione — Stato: In attesa di conferma" subtitle="Controlla i dati estratti. Per i conflitti scegli se aggiornare o creare nuovo." onClose={()=>setPreviewData(null)} wide>
      <ConflictResolver data={previewData} onConfirm={confirmImport} onCancel={()=>setPreviewData(null)}/>
    </Modal>}

    <div style={{padding:"12px 16px",background:"#f0fdf4",border:"1px solid #16a34a",marginBottom:12,fontSize:12}}>
      <div style={{fontWeight:700,marginBottom:6,color:"#166534",fontSize:13}}>🤖 Import Smart — tutti i campi sincronizzati automaticamente</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:8,color:"#166534",lineHeight:1.7}}>
        <div>📋 <strong>PDF</strong> → Draft Editor (revisione campo per campo prima del salvataggio)</div>
        <div>📊 <strong>Excel</strong> → Auto-mapping + Anteprima + Conflict Resolver</div>
        <div>📄 <strong>Word</strong> → AI parsing + Anteprima + Conflict Resolver</div>
      </div>
      <div style={{marginTop:8,padding:"6px 10px",background:"#dcfce7",border:"1px solid #86efac",fontSize:11,color:"#166534"}}>
        <strong>Campi estratti:</strong> Nome · Cognome · Città · Data nascita · Età · Inizio/Fine campo · N° settimane · Navetta (+ trasferimento) · Pranzo al sacco · Quota · Acconto · Saldo · Allergie/Note mediche · Telefono · Genitore · Stato pagamento — <strong>dopo "Salva le Modifiche" tutto si aggiorna: BEP · Navette · Pasti · Saldi</strong>
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12,marginBottom:14}}>
      {[
        {ext:"Excel .xlsx",icon:"📊",desc:"Auto-mapping + sync immediato verso tutte le tabelle",types:".xlsx,.xls"},
        {ext:"Word .docx",icon:"📄",desc:"Claude AI estrae struttura dati e popola tutte le colonne",types:".docx"},
        {ext:"PDF modulo",icon:"📋",desc:"Claude OCR → Draft Editor → revisione → salvataggio definitivo",types:".pdf"}
      ].map(f=>(
        <div key={f.ext} style={{background:"#fff",border:"1px solid #000",padding:16,textAlign:"center"}}>
          <div style={{fontSize:26,marginBottom:4}}>{f.icon}</div>
          <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{f.ext}</div>
          <div style={{fontSize:10,color:"#888",marginBottom:10,lineHeight:1.4}}>{f.desc}</div>
          <label style={{display:"block",padding:"9px",background:uploading?"#ccc":"#111",color:"#fff",fontSize:12,fontWeight:600,cursor:uploading?"not-allowed":"pointer"}}>
            {uploading?"Elaborazione…":`⬆ Carica ${f.ext}`}
            <input type="file" accept={f.types} style={{display:"none"}} onChange={e=>{if(e.target.files[0]){handleFile(e.target.files[0]);e.target.value="";}}} disabled={uploading}/>
          </label>
        </div>
      ))}
    </div>
    <div style={{border:"2px dashed #000",padding:24,textAlign:"center",marginBottom:14,background:"#fafafa"}}
      onDragOver={e=>{e.preventDefault();e.currentTarget.style.background="#f0f9ff";}}
      onDragLeave={e=>{e.currentTarget.style.background="#fafafa";}}
      onDrop={e=>{e.preventDefault();e.currentTarget.style.background="#fafafa";handleFile(e.dataTransfer.files[0]);}}>
      <div style={{fontSize:22,marginBottom:4}}>📂</div>
      <div style={{fontSize:13,fontWeight:700,color:"#555"}}>Trascina qui un file</div>
      <div style={{fontSize:11,color:"#888"}}>Auto-sync · Anteprima · Gestione conflitti · Navette e Pasti aggiornati automaticamente</div>
    </div>
    {log.length>0&&<div style={{background:"#fff",border:"1px solid #000",padding:12}}>
      <div style={{fontSize:11,fontWeight:700,marginBottom:6,textTransform:"uppercase"}}>📋 Log</div>
      <div style={{maxHeight:180,overflowY:"auto"}}>
        {log.map((l,i)=><div key={i} style={{fontSize:11,padding:"2px 0",borderBottom:"0.5px solid #f0f0f0",color:l.type==="ok"?"#166534":l.type==="error"?"#991b1b":l.type==="warn"?"#854d0e":"#444"}}>
          <span style={{color:"#aaa",marginRight:6,fontSize:10}}>{l.ts}</span>{l.msg}
        </div>)}
      </div>
    </div>}
  </div>);
}



/* ══ TAB ISCRITTI ════════════════════════════════════════════ */
function TabIscritti({data,setData,showToast}){
  const[view,setView]=useState("table");
  const[fS,setFS]=useState(0);const[fSt,setFSt]=useState("tutti");
  const[fA,setFA]=useState(false);const[fI,setFI]=useState(false);
  const[cerca,setCerca]=useState("");const[confirmDel,setConfirmDel]=useState(null);
  const nF=[fS!==0,fSt!=="tutti",fA,fI,cerca.trim()!==""].filter(Boolean).length;
  const resetF=()=>{setFS(0);setFSt("tutti");setFA(false);setFI(false);setCerca("");};
  const upd=useCallback((id,k,v)=>setData(prev=>prev.map(r=>{
    if(r.id!==id)return r;
    const u={...r,[k]:v};
    if(["quota","acconto","saldato"].includes(k)){u.da_saldare=calcResidue(u);u.stato=autoStato(u);}
    return u;
  })),[setData]);
  const add=()=>setData(p=>[{id:uid(),bambino:"",nato_il:"",eta:0,inizio:"08/06/2026",fine:"03/07/2026",sett:1,nav:false,pasto_casa:false,citta:"",quota:0,acconto:0,saldato:0,da_saldare:0,stato:"DA PAGARE",note_pag:"",note_bimbo:"",telefono:"",genitore:""},...p]);
  const TH={background:"#111",color:"#fff",padding:"7px 8px",border:"1px solid #000",textAlign:"center",fontWeight:600,fontSize:11,whiteSpace:"nowrap"};
  const TD=ex=>({border:"1px solid #000",padding:"5px 7px",textAlign:"center",fontSize:12,...ex});
  const iS={border:"none",background:"transparent",width:"100%",textAlign:"center",fontSize:12,color:"#1a1a1a",padding:0};
  const lista=data.filter(r=>{
    if(cerca.trim()&&![r.bambino,r.genitore,r.citta,r.note_bimbo].some(v=>String(v||"").toLowerCase().includes(cerca.toLowerCase())))return false;
    if(fS!==0&&!calcWeeks(r.inizio,r.sett).includes(fS))return false;
    if(fSt!=="tutti"&&r.stato!==fSt)return false;
    if(fA&&!noteType(r.note_bimbo))return false;
    if(fI&&!isIncomplete(r))return false;
    return true;
  });
  const{sorted,STH}=useSorted(lista);
  const tot=sorted.reduce((a,r)=>({q:a.q+(r.quota||0),inc:a.inc+(r.stato==="SALDATO"?r.quota||0:r.stato==="ACCONTO"?(r.acconto||0)+(r.saldato||0):0),res:a.res+(r.da_saldare||0)}),{q:0,inc:0,res:0});

  return(<div>
    {confirmDel&&<Modal title="Elimina iscritto" onClose={()=>setConfirmDel(null)}>
      <p style={{marginBottom:16,lineHeight:1.6}}>Stai per eliminare <strong>{confirmDel.bambino}</strong>. Confermi?</p>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={()=>setConfirmDel(null)} style={{padding:"7px 14px",border:"1px solid #000",background:"#fff",cursor:"pointer"}}>Annulla</button>
        <button onClick={()=>{setData(p=>p.filter(r=>r.id!==confirmDel.id));showToast(`${confirmDel.bambino} eliminato`,"warn");setConfirmDel(null);}} style={{padding:"7px 16px",border:"1px solid #000",background:"#dc2626",color:"#fff",cursor:"pointer",fontWeight:700}}>Elimina</button>
      </div>
    </Modal>}
    {/* filtri */}
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10,alignItems:"center"}}>
      <input value={cerca} onChange={e=>setCerca(e.target.value)} placeholder="🔍 Cerca…" style={{padding:"6px 10px",fontSize:12,border:"1px solid #000",minWidth:160}}/>
      <select value={fS} onChange={e=>setFS(Number(e.target.value))} style={{padding:"6px 8px",fontSize:12,border:"1px solid #000"}}>
        <option value={0}>Tutte le settimane</option>
        {WEEKS.map(w=><option key={w.id} value={w.id}>{w.label} — {w.range}</option>)}
      </select>
      <select value={fSt} onChange={e=>setFSt(e.target.value)} style={{padding:"6px 8px",fontSize:12,border:"1px solid #000"}}>
        <option value="tutti">Tutti gli stati</option>
        <option value="SALDATO">Saldato</option><option value="ACCONTO">Acconto</option><option value="DA PAGARE">Da pagare</option>
      </select>
      <button onClick={()=>setFA(!fA)} style={{padding:"5px 9px",fontSize:11,border:`1px solid ${fA?"#dc2626":"#ccc"}`,background:fA?"#fee2e2":"#fff",cursor:"pointer"}}>🚨 Allergie</button>
      <button onClick={()=>setFI(!fI)} style={{padding:"5px 9px",fontSize:11,border:`1px solid ${fI?"#d97706":"#ccc"}`,background:fI?"#fef3c7":"#fff",cursor:"pointer"}}>⚠ Incompleti</button>
      {nF>0&&<button onClick={resetF} style={{padding:"5px 9px",fontSize:11,border:"1px solid #000",background:"#111",color:"#fff",cursor:"pointer",fontWeight:700}}>{nF} filtri · ✕</button>}
      <div style={{marginLeft:"auto",display:"flex",gap:6}}>
        <button onClick={()=>setView(v=>v==="table"?"card":"table")} style={{padding:"5px 9px",fontSize:11,border:"1px solid #000",background:"#fff",cursor:"pointer"}}>{view==="table"?"📇 Schede":"📋 Tabella"}</button>
        <button onClick={add} style={{padding:"5px 12px",fontSize:11,border:"1px solid #000",background:"#111",color:"#fff",cursor:"pointer",fontWeight:700}}>+ Aggiungi</button>

    </div>
    {/* KPI */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:8,marginBottom:12}}>
      {[["Mostrati",sorted.length,"#111"],["🚐 Navetta",sorted.filter(r=>r.nav).length,"#1e40af"],["🍽️ Pasti",sorted.filter(r=>!r.pasto_casa).length,"#166534"],["🥪 Sacco",sorted.filter(r=>r.pasto_casa).length,"#854d0e"],["Quote",E(tot.q),"#185FA5"],["Incassato",E(tot.inc),"#166534"]].map(([l,v,c])=>(
        <div key={l} style={{background:"#fff",border:"1px solid #000",padding:"9px 11px"}}><div style={{fontSize:10,color:"#666",marginBottom:2}}>{l}</div><div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div></div>
      ))}
    </div>
    {/* VISTA SCHEDE */}
    {view==="card"&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:10}}>
      {sorted.map(r=>{const nt=noteType(r.note_bimbo);const ns=nt?NST[nt]:null;const inc=isIncomplete(r);
        return(<div key={r.id} style={{background:"#fff",border:`1px solid ${inc?"#d97706":"#000"}`,padding:14,position:"relative"}}>
          {inc&&<span style={{position:"absolute",top:10,right:10,width:8,height:8,borderRadius:"50%",background:"#d97706"}}/>}
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <div><div style={{fontWeight:800,fontSize:14}}>{r.bambino||<em style={{color:"#aaa"}}>Nome mancante</em>}</div><div style={{fontSize:11,color:"#666"}}>{r.citta} · {r.eta||0}a</div></div>
            <span style={{background:SBG[r.stato]||"#f5f5f3",color:SCL[r.stato]||"#666",padding:"2px 7px",fontSize:10,fontWeight:700,border:"1px solid #000"}}>{r.stato}</span>
          </div>
          {nt&&<div style={{padding:"3px 7px",marginBottom:7,background:ns.bg,border:ns.border,fontSize:11,color:ns.col,fontWeight:700}}>{ns.icon} {r.note_bimbo}</div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,marginBottom:8}}>
            {[["Quota",E(r.quota||0),"#f5f5f3","#000"],["Acconto",E(r.acconto||0),"#f0fdf4","#166534"],["Residuo",E(r.da_saldare||0),(r.da_saldare||0)>0?"#fef2f2":"#f0fdf4",(r.da_saldare||0)>0?"#dc2626":"#166534"]].map(([l,v,bg,c])=>(
              <div key={l} style={{textAlign:"center",padding:"5px 4px",background:bg,border:"1px solid #e0e0e0"}}><div style={{fontSize:10,color:"#888"}}>{l}</div><div style={{fontSize:12,fontWeight:700,color:c}}>{v}</div></div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
            {[["Acconto €","acconto",r.acconto||0],["Saldo €","saldato",r.saldato||0]].map(([lbl,field,val])=>(
              <div key={field}><label style={{fontSize:10,color:"#666",display:"block",marginBottom:2}}>{lbl}</label>
                <input type="number" value={val} min={0} onChange={e=>upd(r.id,field,Number(e.target.value))} style={{padding:"5px 7px",fontSize:12,border:"1px solid #000",width:"100%"}}/></div>
            ))}
          </div>
          <div style={{display:"flex",gap:6}}>
            <select value={r.stato} onChange={e=>upd(r.id,"stato",e.target.value)} style={{flex:1,padding:"5px 6px",fontSize:11,border:"1px solid #000",background:SBG[r.stato],color:SCL[r.stato],fontWeight:700,cursor:"pointer"}}>
              <option value="SALDATO">Saldato</option><option value="ACCONTO">Acconto</option><option value="DA PAGARE">Da pagare</option>
            </select>
            <button onClick={()=>setConfirmDel(r)} style={{padding:"5px 10px",fontSize:11,border:"1px solid #dc2626",background:"#fee2e2",color:"#dc2626",cursor:"pointer",fontWeight:700}}>× Elimina</button>
          </div>
        </div>);
      })}
    </div>}
    {/* VISTA TABELLA */}
    {view==="table"&&<div style={{overflowX:"auto",border:"2px solid #000"}}>
      <table style={{borderCollapse:"collapse",width:"100%",fontSize:12}}>
        <thead><tr>

          <th style={TH}>🍽️</th>

          <th style={{...TH,background:"#166534"}}>Saldo</th>

          <th style={TH}>Genitore</th>
          <th style={TH}></th>
        </tr></thead>
        <tbody>
          {sorted.map((r,idx)=>{
            const nt=noteType(r.note_bimbo);const ns=nt?NST[nt]:null;

              <td style={TD({background:rbg,minWidth:120,textAlign:"left"})}><input value={r.bambino||""} onChange={e=>upd(r.id,"bambino",e.target.value)} style={{...iS,textAlign:"left",fontWeight:700}}/></td>
              <td style={TD({background:rbg,width:30})}><input type="number" value={r.eta||0} onChange={e=>upd(r.id,"eta",Number(e.target.value))} style={iS}/></td>
              <td style={TD({background:rbg,width:80})}><select value={r.inizio||"08/06/2026"} onChange={e=>upd(r.id,"inizio",e.target.value)} style={{...iS,cursor:"pointer",fontSize:11}}>{WEEKS.map(w=><option key={w.id} value={w.dal}>{w.dal}</option>)}</select></td>
              <td style={TD({background:rbg,width:28})}><input type="number" value={r.sett||1} min={1} max={8} onChange={e=>upd(r.id,"sett",Number(e.target.value))} style={iS}/></td>

              <td style={TD({background:rbg,width:60})}><input type="number" value={r.quota||0} onChange={e=>upd(r.id,"quota",Number(e.target.value))} style={{...iS,fontWeight:700}}/></td>

              <td style={TD({background:nt?ns.bg:rbg,border:nt?ns.border:"1px solid #000",minWidth:90,textAlign:"left"})}>{nt&&<span style={{marginRight:2}}>{ns.icon}</span>}<input value={r.note_bimbo||""} onChange={e=>upd(r.id,"note_bimbo",e.target.value)} style={{...iS,textAlign:"left",color:nt?ns.col:"#aaa",fontWeight:nt?700:400}} placeholder="nessuna"/></td>
              <td style={TD({background:!r.telefono?"#fef3c7":rbg,width:86})}><input value={r.telefono||""} onChange={e=>upd(r.id,"telefono",e.target.value)} style={{...iS,color:!r.telefono?"#d97706":"inherit"}} placeholder="mancante"/></td>
              <td style={TD({background:!r.genitore?"#fef3c7":rbg,minWidth:90,textAlign:"left"})}><input value={r.genitore||""} onChange={e=>upd(r.id,"genitore",e.target.value)} style={{...iS,textAlign:"left",color:!r.genitore?"#d97706":"inherit"}} placeholder="mancante"/></td>

          <th style={{background:"#111",color:"#86efac",border:"1px solid #000",padding:"5px 8px",fontSize:11}} colSpan={5}>Incassato: {E(tot.inc)}</th>
        </tr></tfoot>
      </table>
    </div>}
  </div>);
}



/* ══ TAB CONTABILITÀ NAVETTE ════════════════════════════════════ */

    if(filtro!=="tutti"&&r.citta!==filtro)return false;
    return true;
  });
  const cities=[...new Set(navRows.map(r=>r.citta))].sort();
  const totFiltro=lista.reduce((s,r)=>s+r.totale,0);

      <div style={{background:"#fff",border:"1px solid #000",padding:14}}>
        <div style={{fontSize:11,color:"#666",marginBottom:4}}>Ricavo medio per bambino</div>

    </div>
    <div style={{overflowX:"auto",border:"2px solid #000"}}>
      <table style={{borderCollapse:"collapse",width:"100%",fontSize:12}}>

function TabFinanziario({data,costs}){
  const sv=useMemo(()=>calcServizi(data),[data]);
  const tF=costs.voci.reduce((s,v)=>s+v.importo,0);
  const scN=Math.max(0,costs.costoNavette-sv.totNav);const scP=Math.max(0,costs.costoCucina-sv.totPasti);
  const ecN=Math.max(0,sv.totNav-costs.costoNavette);const ecP=Math.max(0,sv.totPasti-costs.costoCucina);
  const pN=costs.costoNavette>0?sv.totNav/costs.costoNavette:0;const pP=costs.costoCucina>0?sv.totPasti/costs.costoCucina:0;
  const tQ=data.reduce((s,r)=>s+(r.quota||0),0);
  const tI=data.reduce((s,r)=>s+(r.stato==="SALDATO"?r.quota||0:r.stato==="ACCONTO"?(r.acconto||0)+(r.saldato||0):0),0);
  const tR=data.reduce((s,r)=>s+(r.da_saldare||0),0);
  const qM=data.length>0?tQ/data.reduce((s,r)=>s+(r.sett||1),0):20;
  const tSc=scN+scP;
  const bP=qM>0?Math.ceil((tF+tSc)/qM):0;
  const pTot=data.reduce((s,r)=>s+(r.sett||0),0);
  const bOk=pTot>=bP;const bW=Math.min(100,bP>0?Math.round(pTot/bP*100):0);
  const uN=tI-tF-scN-scP+ecN+ecP;const uP=tQ-tF-scN-scP+ecN+ecP;
  const Pct=v=>isNaN(v)||!isFinite(v)?"0%":(Math.round(v*100)+"%");
  return(<div>
    <div style={{background:"#fff",border:"2px solid #000",padding:16,marginBottom:14}}>
      <div style={{fontWeight:900,fontSize:14,marginBottom:12,borderBottom:"2px solid #000",paddingBottom:6}}>💰 Servizi Accessori</div>

        <div style={{background:"#f0fdf4",border:"1px solid #16a34a",padding:14,textAlign:"center"}}><div style={{fontSize:13,color:"#166534"}}>🍽️ Ricavo Pasti</div><div style={{fontSize:22,fontWeight:900,color:"#166534",marginTop:4}}>{E(sv.totPasti)}</div></div>
        <div style={{background:"#111",border:"1px solid #000",padding:14,textAlign:"center",color:"#fff"}}><div style={{fontSize:13,opacity:.8}}>💰 Totale Extra</div><div style={{fontSize:22,fontWeight:900,marginTop:4}}>{E(sv.totExtra)}</div></div>
      </div>
    </div>
    <div style={{background:"#fff",border:"2px solid #000",padding:16,marginBottom:14}}>
      <div style={{fontWeight:900,fontSize:14,marginBottom:12,borderBottom:"2px solid #000",paddingBottom:6}}>📊 Copertura Servizi</div>

function TabCosti({costs,setCosts}){
  const cats=[...new Set(costs.voci.map(v=>v.cat))];
  const up=(id,k,val)=>setCosts(p=>({...p,voci:p.voci.map(v=>v.id===id?{...v,[k]:val}:v)}));
  const tot=costs.voci.reduce((s,v)=>s+v.importo,0);
  const TH={background:"#111",color:"#fff",padding:"6px 8px",border:"1px solid #000",textAlign:"left",fontSize:11,fontWeight:600};
  const TD={border:"1px solid #000",padding:"5px 8px",fontSize:12};
  const iS={border:"none",background:"transparent",width:"100%",fontSize:12,color:"#1a1a1a",padding:0};
  return(<div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
      <div style={{background:"#fff",border:"1px solid #000",padding:12}}><div style={{fontSize:10,color:"#666",marginBottom:3}}>Totale costi fissi</div><div style={{fontSize:20,fontWeight:900,color:"#dc2626"}}>{E(tot)}</div></div>
      <div style={{background:"#fff",border:"1px solid #000",padding:12}}>
        <div style={{fontSize:10,color:"#666",marginBottom:6}}>Costi servizi esterni (navette+cucina)</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[["Navette €","costoNavette"],["Cucina €","costoCucina"]].map(([l,k])=>(
            <div key={k}><label style={{fontSize:10,color:"#888"}}>{l}</label>
              <input type="number" value={costs[k]} min={0} step={100} onChange={e=>setCosts(p=>({...p,[k]:Number(e.target.value)}))} style={{width:"100%",padding:"4px 6px",fontSize:13,border:"1px solid #000",fontWeight:700}}/></div>
          ))}
        </div>
      </div>
    </div>
    {cats.map(cat=>{
      const voci=costs.voci.filter(v=>v.cat===cat);const sub=voci.reduce((s,v)=>s+v.importo,0);
      return(<div key={cat} style={{background:"#fff",border:"1px solid #000",marginBottom:10,padding:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,borderBottom:"2px solid #000",paddingBottom:5}}>
          <div style={{fontWeight:800,fontSize:13}}>{cat}</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontWeight:700,color:"#185FA5"}}>{E(sub)}</span>
            <button onClick={()=>setCosts(p=>({...p,voci:[...p.voci,{id:uid(),cat,label:"Nuova voce",importo:0,note:""}]}))} style={{padding:"3px 8px",fontSize:11,border:"1px solid #000",background:"#fff",cursor:"pointer",fontWeight:600}}>+ Voce</button>
          </div>
        </div>
        <table style={{borderCollapse:"collapse",width:"100%",fontSize:12}}>
          <thead><tr>{["Descrizione","€","Note",""].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
          <tbody>{voci.map(v=>(
            <tr key={v.id}>
              <td style={{...TD,minWidth:180,textAlign:"left"}}><input value={v.label} onChange={e=>up(v.id,"label",e.target.value)} style={{...iS,textAlign:"left"}}/></td>
              <td style={{...TD,width:100}}><input type="number" value={v.importo} min={0} onChange={e=>up(v.id,"importo",Number(e.target.value))} style={{...iS,fontWeight:700}}/></td>
              <td style={{...TD,minWidth:130,textAlign:"left"}}><input value={v.note} onChange={e=>up(v.id,"note",e.target.value)} style={{...iS,textAlign:"left",color:"#666",fontSize:11}} placeholder="note…"/></td>
              <td style={{...TD,width:26}}><button onClick={()=>setCosts(p=>({...p,voci:p.voci.filter(x=>x.id!==v.id)}))} style={{background:"none",border:"none",color:"#dc2626",fontSize:14,cursor:"pointer",fontWeight:900}}>×</button></td>
            </tr>
          ))}</tbody>
        </table>
      </div>);
    })}
    <button onClick={()=>{const c=window.prompt("Nome nuova categoria:");if(c)setCosts(p=>({...p,voci:[...p.voci,{id:uid(),cat:c.trim(),label:"Nuova voce",importo:0,note:""}]}));}} style={{padding:"7px 14px",border:"1px solid #000",background:"#fff",fontSize:12,cursor:"pointer",fontWeight:600}}>+ Nuova categoria</button>
    <div style={{marginTop:12,background:"#111",color:"#fff",padding:12,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,fontWeight:700}}>TOTALE COSTI FISSI</span><span style={{fontSize:20,fontWeight:900,color:"#fca5a5"}}>{E(tot)}</span></div>
  </div>);
}

          setData(p);setSnap(JSON.stringify(p));
        }else{
          setData(INITIAL_DATA);setSnap(JSON.stringify(INITIAL_DATA));
        }
        const{data:cfg}=await SB.from("config").select("*").eq("chiave","costs").single();
        if(cfg?.valore)setCosts(cfg.valore);
      }catch(e){showToast("Errore caricamento: "+e.message,"error");}
      setLoading(false);
    })();
  },[]);

  const handleSave=useCallback(async()=>{
    setSaving(true);
    try{
      if(data.length>0){
        const cleanData=data.map(r=>{const{_tipo,...rest}=r;return{...rest,updated_at:new Date().toISOString()};});const{error}=await SB.from("iscritti").upsert(cleanData);
        if(error)throw error;
        const ids=data.map(r=>r.id);
        await SB.from("iscritti").delete().not("id","in",`(${ids.map(i=>`"${i}"`).join(",")})`);
      }else{
        await SB.from("iscritti").delete().neq("id","__never__");
      }
      await SB.from("config").upsert([{chiave:"costs",valore:costs,updated_at:new Date().toISOString()}]);
      const ts=new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});
      setSnap(JSON.stringify(data));setLastSaved(ts);
      showToast(`✓ Salvato su database alle ${ts} · ${data.length} iscritti`);
    }catch(e){showToast("Errore: "+e.message,"error");}
    setSaving(false);
  },[data,costs,showToast]);

  const handleReset=()=>{if(window.confirm("Annullare le modifiche?"))setData(JSON.parse(snap));};
  const handleLogout=async()=>{await SB.auth.signOut();onLogout();};
  const handleSync=useCallback(records=>{
    setData(prev=>{const upd=[...prev];
      records.forEach(rec=>{if(rec.type==="update"){const idx=upd.findIndex(r=>r.id===rec.record.id);if(idx>=0)upd[idx]=rec.record;}else upd.push(rec.record);});
      return upd;
    });
  },[]);
  const handleDraftReady=useCallback(record=>{setDraft(record);showToast("PDF letto — revisiona la bozza prima di salvare","warn");},[showToast]);
  const handleCommitDraft=useCallback((type,record)=>{
    setData(prev=>{if(type==="update")return prev.map(r=>r.id===record.id?record:r);return[...prev,record];});
    setDraft(null);
    showToast(`✓ ${record.bambino} integrato${record.nav?" · navetta sync":""}${!record.pasto_casa?" · pasti sync":""} · BEP aggiornato`);
  },[showToast]);
  const sv=useMemo(()=>calcServizi(data),[data]);
  const incompleti=data.filter(isIncomplete).length;
  const allergici=data.filter(r=>noteType(r.note_bimbo)).length;
  const gRes=useMemo(()=>{if(!globalQ.trim()||globalQ.length<2)return[];const q=globalQ.toLowerCase();return data.filter(r=>[r.bambino,r.genitore,r.citta,r.note_bimbo].some(v=>String(v||"").toLowerCase().includes(q))).slice(0,8);},[globalQ,data]);
  const TABS=[
    {id:"import",l:"🤖 Import Smart"},
    {id:"iscritti",l:"Iscritti & Pagamenti"},
    {id:"nav_contab",l:"🚐 Cont. Navette"},
    {id:"pasti_contab",l:"🍽️ Cont. Pasti"},
    {id:"finanziario",l:"Finanziario & BEP"},
    {id:"costi",l:"Costi"},
    {id:"navette",l:"Navette"},
    {id:"export",l:"Export"},
  ];
  const tS=on=>({padding:"9px 13px",border:"none",background:"transparent",borderBottom:on?"3px solid #111":"3px solid transparent",color:on?"#111":"#888",fontWeight:on?700:400,cursor:"pointer",fontSize:12,whiteSpace:"nowrap",marginBottom:-2});

  if(loading)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16}}>
    <div style={{fontSize:36}}>🌿</div><div style={{fontSize:14,color:"#666"}}>Caricamento dati…</div>
  </div>);

  return(<div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",padding:"1rem",background:"#fafafa",minHeight:"100vh"}}>
    {toast&&<Toast msg={toast.msg} type={toast.type||"ok"} onDone={()=>setToast(null)}/>}
    <ApiKeyBanner/>
    {draft&&<DraftEditorPanel draft={draft} existingData={data} onCommit={handleCommitDraft} onDiscard={()=>{setDraft(null);showToast("Bozza scartata","warn");}} showToast={showToast}/>}
    <div style={{marginBottom:"0.75rem",borderBottom:"2px solid #000",paddingBottom:10,display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
      <div>
        <h1 style={{fontSize:18,fontWeight:900,letterSpacing:"-0.02em",margin:"0 0 2px"}}>🌿 Campi Natura Macaranga 2026</h1>
        <div style={{fontSize:11,color:"#666",display:"flex",gap:10,flexWrap:"wrap"}}>
          <span>{data.length} iscritti</span>
          <span style={{color:"#1e40af",fontWeight:600}}>🚐 {E(sv.totNav)}</span>
          <span style={{color:"#166534",fontWeight:600}}>🍽️ {E(sv.totPasti)}</span>
          <span style={{fontWeight:700}}>💰 {E(sv.totExtra)}</span>
          {incompleti>0&&<span style={{color:"#d97706",fontWeight:700}}>⚠ {incompleti} incompleti</span>}
          {allergici>0&&<span style={{color:"#dc2626",fontWeight:700}}>🚨 {allergici} allergie</span>}
        </div>
      </div>
      <div style={{position:"relative"}}>
        <input value={globalQ} onChange={e=>setGlobalQ(e.target.value)} placeholder="🔍 Cerca…" style={{padding:"7px 12px",fontSize:12,border:"1px solid #000",background:"#fff",width:200}}/>
        {gRes.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #000",zIndex:200,boxShadow:"0 4px 12px rgba(0,0,0,.15)"}}>
          {gRes.map(r=><div key={r.id} onClick={()=>{setTab("iscritti");setGlobalQ("");}} style={{padding:"7px 10px",borderBottom:"0.5px solid #eee",cursor:"pointer",fontSize:12}} onMouseEnter={e=>e.currentTarget.style.background="#f5f5f3"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
            <span style={{fontWeight:700}}>{r.bambino}</span><span style={{color:"#888",marginLeft:8,fontSize:11}}>{r.citta} · {r.stato}</span>
          </div>)}
        </div>}
      </div>
    </div>
    <SaveBar hasChanges={hasChanges} saving={saving} onSave={handleSave} onReset={handleReset} lastSaved={lastSaved} onLogout={handleLogout}/>
    <div style={{display:"flex",gap:0,borderBottom:"2px solid #000",marginBottom:"1.25rem",overflowX:"auto"}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={tS(tab===t.id)}>{t.l}</button>)}
    </div>
    {tab==="import"       && <TabImport onSync={handleSync} existingData={data} showToast={showToast} onDraftReady={handleDraftReady} savedMappings={savedMappings} setSavedMappings={setSavedMappings}/>}
    {tab==="iscritti"    && <TabIscritti data={data} setData={setData} showToast={showToast}/>}
    {tab==="nav_contab"  && <TabNavetteContab data={data} giorniSett={5} showToast={showToast}/>}
    {tab==="pasti_contab"&& <TabPastiContab data={data} giorniSett={5} showToast={showToast}/>}
    {tab==="finanziario" && <TabFinanziario data={data} costs={costs} setCosts={setCosts} showToast={showToast}/>}
    {tab==="costi"       && <TabCosti costs={costs} setCosts={setCosts}/>}
    {tab==="navette"     && <TabNavette data={data}/>}
    {tab==="export"      && <TabExport data={data}/>}
  </div>);
}

/* ══ ROOT ════════════════════════════════════════════════════ */
function Root(){
  const[session,setSession]=useState(null);
  const[checking,setChecking]=useState(true);
  useEffect(()=>{
    SB.auth.getSession().then(({data:{session}})=>{setSession(session);setChecking(false);});
    const{data:{subscription}}=SB.auth.onAuthStateChange((_,s)=>setSession(s));
    return()=>subscription.unsubscribe();
  },[]);
  if(checking)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}><div style={{fontSize:14,color:"#666"}}>Verifica sessione…</div></div>);
  if(!session)return<Login onLogin={()=>SB.auth.getSession().then(({data:{session}})=>setSession(session))}/>;
  return<MainApp onLogout={()=>setSession(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
